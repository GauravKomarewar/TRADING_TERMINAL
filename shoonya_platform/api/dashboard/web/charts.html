<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Charts – Shoonya OMS</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="/dashboard/web/styles/common.css">
<link rel="stylesheet" href="/dashboard/web/shared/layout.css">
<script src="/dashboard/web/shared/pages-config.js" defer></script>
<script src="/dashboard/web/shared/layout.js" defer></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{padding:60px 0 0;line-height:1.5;overflow:hidden;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
main{display:flex;flex-direction:column;height:calc(100vh - 60px);background:var(--chart-bg,#131722)}

/* ── CSS vars for theming ── */
:root{
  --chart-bg:#131722;--toolbar-bg:#1e222d;--border:#2a2e39;--btn-hover:#363a45;
  --text-primary:#ffffff;--text-secondary:#b2b5be;--text-muted:#787b86;
  --accent:#2962ff;--accent-bg:rgba(41,98,255,.15);
  --up:#26a69a;--dn:#ef5350;--grid:#1e222d;--cross:#363a45;
  --modal-bg:#1e222d;--input-bg:#131722;--section-bg:#1a1e2b;
}
body.theme-light{
  --chart-bg:#ffffff;--toolbar-bg:#f0f3fa;--border:#dde1eb;--btn-hover:#e8eaf2;
  --text-primary:#131722;--text-secondary:#434651;--text-muted:#787b86;
  --accent:#2962ff;--accent-bg:rgba(41,98,255,.1);
  --up:#26a69a;--dn:#ef5350;--grid:#f0f3fa;--cross:#b2b5be;
  --modal-bg:#ffffff;--input-bg:#f0f3fa;--section-bg:#f5f7fe;
}
body.theme-hc-dark{
  --chart-bg:#000000;--toolbar-bg:#0a0a0a;--border:#333;--btn-hover:#222;
  --text-primary:#ffffff;--text-secondary:#ffffff;--text-muted:#aaa;
  --up:#00ff88;--dn:#ff3355;--grid:#111;--cross:#555;
  --modal-bg:#111;--input-bg:#000;--section-bg:#0d0d0d;
}
body.theme-hc-light{
  --chart-bg:#ffffff;--toolbar-bg:#ffffff;--border:#000;--btn-hover:#eee;
  --text-primary:#000;--text-secondary:#000;--text-muted:#333;
  --up:#006600;--dn:#cc0000;--grid:#e8e8e8;--cross:#666;
  --modal-bg:#fff;--input-bg:#f5f5f5;--section-bg:#fafafa;
}
body.theme-solar{
  --chart-bg:#002b36;--toolbar-bg:#073642;--border:#586e75;--btn-hover:#0d4a5a;
  --text-primary:#93a1a1;--text-secondary:#839496;--text-muted:#657b83;
  --accent:#268bd2;--accent-bg:rgba(38,139,210,.2);
  --up:#859900;--dn:#dc322f;--grid:#073642;--cross:#586e75;
  --modal-bg:#073642;--input-bg:#002b36;--section-bg:#003847;
}

/* ── Toolbar ── */
.tv-toolbar{display:flex;align-items:center;background:var(--toolbar-bg);border-bottom:1px solid var(--border);height:40px;padding:0 6px;flex-shrink:0;overflow-x:auto;gap:2px}
.tv-toolbar::-webkit-scrollbar{height:0}
.tv-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0}
.tv-btn{display:inline-flex;align-items:center;justify-content:center;height:30px;padding:0 10px;background:transparent;color:var(--text-primary);border:none;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;gap:5px}
.tv-btn:hover{background:var(--btn-hover);color:var(--text-primary)}
.tv-btn.active{color:var(--accent);background:var(--accent-bg)}
.tv-btn svg{width:16px;height:16px;flex-shrink:0;fill:currentColor}
.tv-btn svg.stroke-icon{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tv-sym-btn{font-size:13px;font-weight:700;color:var(--text-primary);padding:0 10px;gap:6px}
.tv-sym-btn .arrow{width:8px;height:8px;margin-left:2px;opacity:.7;fill:var(--text-primary)}
.tv-add-sym{width:26px;height:26px;background:var(--accent-bg);border:1px solid var(--accent);border-radius:4px;color:var(--accent);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-weight:700;transition:all .15s;flex-shrink:0;line-height:1}
.tv-add-sym:hover{background:var(--accent);color:#fff}

/* ── Body ── */
.tv-body{display:flex;flex:1;overflow:hidden;position:relative}

/* Drawing bar */
.tv-draw-bar{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--toolbar-bg);border-right:1px solid var(--border);padding:6px 3px;width:40px;flex-shrink:0}
.tv-draw-btn{width:34px;height:34px;background:transparent;border:none;border-radius:5px;color:#e0e3eb;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative;font-size:18px;line-height:1}
.tv-draw-btn:hover{background:var(--btn-hover);color:#2962ff}
.tv-draw-btn.active{color:#2962ff;background:rgba(41,98,255,.15)}
.tv-draw-btn svg{width:20px;height:20px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tv-draw-btn .tip{position:absolute;left:38px;top:50%;transform:translateY(-50%);background:#363a45;color:#e0e3eb;font-size:11px;padding:3px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20;border:1px solid var(--border)}
.tv-draw-btn:hover .tip{opacity:1}
.tv-draw-sep{width:22px;height:1px;background:var(--border);margin:3px 0}
.tv-draw-btn .emoji-icon{font-size:16px;line-height:1}

/* Chart area */
.tv-chart-wrap{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
.tv-chart-container{flex:1;width:100%}

/* OHLC overlay */
.tv-ohlc{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;display:flex;flex-direction:column;gap:1px;font-size:11.5px;align-items:center}
.tv-ohlc-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:center}
#overlayOhlcBar{pointer-events:auto}
.tv-ohlc .sym{font-weight:700;color:var(--text-primary);font-size:13px;margin-right:2px}
.tv-ohlc .ov-sym{font-weight:600;font-size:11px;margin-right:2px}
.tv-ohlc .intv{color:var(--text-muted);font-size:10px;margin-right:6px}
.tv-ohlc .lbl{color:var(--text-muted)}
.tv-ohlc .val{margin-right:4px;color:var(--text-secondary)}
.tv-ohlc .up{color:var(--up)!important}
.tv-ohlc .dn{color:var(--dn)!important}

/* Zoom */
.tv-zoom{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:6;display:flex;align-items:center;gap:1px;background:rgba(30,34,45,.7);border:1px solid var(--border);border-radius:6px;padding:2px;backdrop-filter:blur(6px);opacity:.55;transition:opacity .2s}
.tv-zoom:hover{opacity:1}
.tv-zoom button{width:30px;height:30px;background:transparent;border:none;border-radius:4px;color:#e0e3eb;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;font-weight:600;transition:all .12s}
.tv-zoom button:hover{background:var(--btn-hover);color:var(--accent)}
.tv-zoom button svg{width:14px;height:14px;fill:currentColor}

/* Range bar */
.tv-range{display:flex;align-items:center;background:var(--toolbar-bg);border-top:1px solid var(--border);height:28px;padding:0 8px;flex-shrink:0;gap:2px}
.tv-range button{height:22px;padding:0 8px;background:transparent;color:var(--text-muted);border:none;border-radius:3px;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s}
.tv-range button:hover{color:var(--text-primary)}
.tv-range button.active{color:var(--accent);background:var(--accent-bg)}
.tv-range .status{margin-left:auto;font-size:10.5px;color:var(--text-muted)}

/* Loading */
.tv-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(19,23,34,.85);color:var(--text-muted);font-size:13px;z-index:10;pointer-events:none}

/* Draw crosshair hint */
.draw-hint{position:absolute;bottom:42px;left:50%;transform:translateX(-50%);z-index:7;background:var(--accent);color:#fff;font-size:11px;padding:4px 12px;border-radius:4px;pointer-events:none;display:none}

/* Drawing delete button */
.tv-draw-del{position:absolute;z-index:8;background:var(--toolbar-bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;color:var(--dn);font-size:14px;line-height:1;display:none;pointer-events:auto}
.tv-draw-del:hover{background:var(--dn);color:#fff}

/* ── Modals ── */
.tv-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:100px}
.tv-modal.open{display:flex}
.m-box{background:var(--modal-bg);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.6);max-height:78vh;overflow:hidden;animation:modalIn .18s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.m-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.m-hdr h3{font-size:13.5px;font-weight:600;color:var(--text-primary);margin:0}
.m-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;padding:2px 6px;border-radius:4px;line-height:1;color:var(--text-secondary)}
.m-close:hover{background:var(--btn-hover);color:var(--text-primary)}
.m-search{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.m-search input{width:100%;padding:7px 12px;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);border-radius:6px;font-size:12.5px;outline:none;font-family:inherit}
.m-search input:focus{border-color:var(--accent)}
.m-search input::placeholder{color:var(--text-muted)}
.m-body{overflow-y:auto;flex:1;padding:4px 0}
.m-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:var(--text-secondary);font-size:12.5px;transition:background .1s}
.m-item:hover{background:var(--btn-hover)}
.m-item.active{background:var(--accent-bg);color:var(--accent)}
.m-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.m-item .dot.live{background:var(--up)}
.m-item .dot.off{background:var(--border)}
.m-item .name{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary)}
.m-item .desc{font-size:11px;color:var(--text-muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.m-item .badge{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;flex-shrink:0}
.m-item .badge.idx{background:var(--accent-bg);color:var(--accent)}
.m-item .badge.opt{background:rgba(38,166,154,.12);color:var(--up)}
.m-item .badge.mcx{background:rgba(251,191,36,.12);color:#fbbf24}
.m-item .check{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.m-item.active .check{background:var(--accent);border-color:var(--accent);color:#fff}
.m-item .swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.m-item .ind-gear{margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px;line-height:1}
.m-item .ind-gear:hover{background:var(--btn-hover);color:var(--text-primary)}
.m-section{padding:5px 12px;font-size:10.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;background:var(--section-bg)}
.m-sym-emoji{font-size:16px;flex-shrink:0;width:20px;text-align:center}

/* Settings & Theme body */
.s-body{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.s-section{border-bottom:1px solid var(--border);padding-bottom:10px}
.s-section:last-child{border-bottom:none;padding-bottom:0}
.s-title{font-size:10.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.s-row{display:flex;align-items:center;justify-content:space-between;color:var(--text-secondary);font-size:12.5px;margin-bottom:6px}
.s-row:last-child{margin-bottom:0}
.s-row label{color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;width:100%;justify-content:space-between}
.s-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.s-row select{padding:4px 8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;font-size:11.5px;outline:none;font-family:inherit}
.s-row select:focus{border-color:var(--accent)}
.s-row input[type=color]{width:30px;height:24px;border:1px solid var(--border);border-radius:4px;background:var(--input-bg);cursor:pointer;padding:1px 2px}
.s-row input[type=number],
.s-row input[type=text]{padding:4px 8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;font-size:11.5px;outline:none;width:70px;font-family:inherit}
.s-row input:focus{border-color:var(--accent)}
.s-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.s-btns button{padding:6px 16px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:all .15s}
.s-btn-reset{background:transparent;color:var(--dn);border:1px solid var(--dn)!important}
.s-btn-reset:hover{background:var(--dn);color:#fff}
.s-btn-apply{background:var(--accent);color:#fff}
.s-btn-apply:hover{background:#1a52e8}

/* Theme grid */
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 0}
.theme-card{border:2px solid var(--border);border-radius:8px;padding:8px 6px;cursor:pointer;transition:all .15s;text-align:center}
.theme-card:hover{border-color:var(--accent)}
.theme-card.active{border-color:var(--accent);background:var(--accent-bg)}
.theme-preview{width:100%;height:28px;border-radius:5px;margin-bottom:5px;display:flex;gap:2px;padding:4px;overflow:hidden}
.theme-preview span{flex:1;border-radius:3px}
.theme-label{font-size:10.5px;color:var(--text-secondary);font-weight:500}

/* Indicator settings modal */
.ind-settings-body{padding:14px;display:flex;flex-direction:column;gap:10px;min-width:260px}
.ind-settings-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--text-secondary)}
.ind-settings-row label{color:var(--text-secondary);min-width:90px}
.ind-settings-row input{padding:5px 8px;background:var(--input-bg);border:1px solid var(--border);color:var(--text-primary);border-radius:4px;font-size:12px;outline:none;font-family:inherit;width:100%}
.ind-settings-row input:focus{border-color:var(--accent)}
.ind-settings-row input[type=color]{width:36px;height:26px;padding:1px 2px}

/* Mobile drawing bar (horizontal bottom strip) */
.tv-draw-mobile{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--toolbar-bg);border-top:1px solid var(--border);height:40px;align-items:center;gap:2px;padding:0 4px;overflow-x:auto}
.tv-draw-mobile::-webkit-scrollbar{height:0}
.tv-draw-mobile .tv-draw-btn{width:32px;height:32px;font-size:16px;flex-shrink:0}

/* Chart mode toggle */
.tv-chart-mode{display:inline-flex;align-items:center;gap:2px;background:var(--input-bg);border:1px solid var(--border);border-radius:5px;padding:1px;margin-left:4px}
.tv-chart-mode button{height:24px;padding:0 8px;border:none;background:transparent;color:var(--text-muted);border-radius:4px;font-size:10.5px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.tv-chart-mode button.active{background:var(--accent);color:#fff}

/* Mobile */
@media(max-width:768px){
  body{padding-top:0!important;overflow:hidden!important;height:100vh!important;height:100dvh!important;height:100svh!important}
  main{height:100vh!important;height:100dvh!important;height:100svh!important;margin:0;padding:0 0 40px 0}
  #app-header{display:none!important}
  .global-ticker{display:none!important}
  .nav-overlay{display:none!important}
  .tv-toolbar{height:36px;gap:1px;padding:0 2px;flex-shrink:0}
  .tv-btn{font-size:11px;height:26px;padding:0 5px}
  .tv-sym-btn{font-size:12px}
  .tv-draw-bar{display:none!important}
  .tv-draw-mobile{display:flex}
  .tv-body{flex:1;min-height:0}
  .tv-chart-wrap{flex:1;min-height:0}
  .tv-chart-container{flex:1;min-height:0}
  .tv-ohlc{font-size:10px;gap:2px}
  .tv-range{height:24px;flex-shrink:0}
  .tv-range button{font-size:10px;padding:0 6px;height:18px}
  .tv-modal{padding-top:60px}
  .m-box{width:95vw!important;max-width:none!important;max-height:76vh}
  .tv-zoom{bottom:52px;left:50%;transform:translateX(-50%)}
  .theme-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:420px){
  .tv-btn span.hide-xs{display:none}
  .tv-ohlc .sym{font-size:11px}
  .tv-chart-mode{display:none}
}
</style>
</head>
<body data-page="charts">
<div id="app-header"></div>
<main>
<!-- Toolbar -->
<div class="tv-toolbar">
  <button class="tv-btn tv-sym-btn" id="btnSymbol" title="Change symbol">
    <span id="tbSymEmoji">📈</span>
    <span id="tbSym">NIFTY</span>
    <svg class="arrow" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4z"/></svg>
  </button>
  <button class="tv-add-sym" id="btnAddOverlay" title="Add overlay / compare symbol">+</button>
  <div class="tv-chart-mode" id="chartModeToggle">
    <button class="active" data-mode="separate" title="Separate charts for overlays">Sep</button>
    <button data-mode="combined" title="Combined premium chart">Cmb</button>
  </div>
  <div class="tv-sep"></div>
  <button class="tv-btn" id="btnInterval" title="Timeframe">
    <svg class="stroke-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="lblInterval">3m</span>
    <svg class="arrow" viewBox="0 0 16 16" style="width:8px;height:8px;opacity:.6"><path d="M4 6l4 4 4-4z"/></svg>
  </button>
  <div class="tv-sep"></div>
  <button class="tv-btn" id="btnChartType" title="Chart type">
    <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="7" rx="1"/><rect x="10" y="6" width="4" height="14" rx="1"/><rect x="17" y="10" width="4" height="10" rx="1"/></svg>
    <span class="hide-xs" id="lblChartType">Candles</span>
    <svg class="arrow" viewBox="0 0 16 16" style="width:8px;height:8px;opacity:.6"><path d="M4 6l4 4 4-4z"/></svg>
  </button>
  <div class="tv-sep"></div>
  <button class="tv-btn" id="btnIndicators" title="Indicators">
    <svg class="stroke-icon" viewBox="0 0 24 24"><polyline points="3 20 7 12 11 16 17 6 21 10"/></svg>
    <span class="hide-xs">Indicators</span>
  </button>
  <div class="tv-sep"></div>
  <button class="tv-btn" id="btnTheme" title="Theme">
    <svg class="stroke-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2v10l6 6"/></svg>
    <span class="hide-xs">Theme</span>
  </button>
  <div class="tv-sep"></div>
  <button class="tv-btn" id="btnSettings" title="Chart settings">
    <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path fill="none" stroke="currentColor" stroke-width="1.5" d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<!-- Body -->
<div class="tv-body">
  <!-- Drawing sidebar -->
  <div class="tv-draw-bar">
    <button class="tv-draw-btn" data-tool="crosshairTool" title="Crosshair">✛<span class="tip">Crosshair</span></button>
    <div class="tv-draw-sep"></div>

<script>
(function(){
'use strict';

const API = '/dashboard';

/* ─── MCX symbols ─── */
const MCX_SYMBOLS = ['GOLDPETAL','CRUDEOILM','SILVERMIC','NATGASMINI','COPPERM','ALUMINI','NICKELM','LEADM','ZINCM','GOLD','SILVER','CRUDE','NATURALGAS','COPPER','ALUMINIUM','NICKEL','LEAD','ZINC','MENTHAOIL','CASTOR'];
function isMCX(sym){ return MCX_SYMBOLS.some(s=>sym.toUpperCase().startsWith(s)); }
function getSessionMinutes(sym){
  if(isMCX(sym)) return {startH:9,startM:0,endH:23,endM:30};
  return {startH:9,startM:0,endH:15,endM:30};
}

/* ─── Symbol emojis ─── */
function symEmoji(s){
  s=s.toUpperCase();
  if(s.includes('GOLD')) return '🥇';
  if(s.includes('SILVER')) return '🥈';
  if(s.includes('CRUDE')||s.includes('OIL')) return '🛢️';
  if(s.includes('GAS')) return '🔥';
  if(s.includes('COPPER')) return '🔶';
  if(s.includes('NIFTY')&&s.includes('BANK')) return '🏦';
  if(s.includes('NIFTY')) return '📊';
  if(s.includes('SENSEX')) return '📈';
  if(s.includes('INDIAVIX')) return '📉';
  if(s.includes('USDINR')||s.includes('EUR')) return '💱';
  if(s.endsWith('CE')||s.endsWith('PE')) return '🎯';
  if(s.includes('FIN')) return '💰';

}

/* ─── Helpers ─── */
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
async function fetchJSON(url,opts){
  const r=await fetch(url,{credentials:'include',...opts});
  if(r.status===401||r.status===403){window.location.href='/';return null;}
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||r.statusText);}
  return r.json();
}
function fmt(n){n=+n;if(isNaN(n))return'—';return n.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtVol(v){v=+v;if(isNaN(v)||v===0)return'';if(v>=1e7)return(v/1e7).toFixed(2)+'Cr';if(v>=1e5)return(v/1e5).toFixed(2)+'L';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return''+v;}
function hexRgba(hex,a){if(!hex||hex.length<7)return'rgba(0,0,0,'+a+')';const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}
function fmtIntv(m){return m>=60?(m/60)+'H':m+'m';}

/* ─── State ─── */
let curSym='NIFTY',curIntv=3,curType='candlestick',curRange='7d',curTheme='dark';
let allSymbols=[],optionSymbols=[];
let optionMeta={};  /* curSym -> {exchange,symbol,expiry,strike,option_type,trading_symbol} */

let drawTool='crosshairTool',drawClicks=[],drawState=null;

/* ─── Dynamic indicator system: add any indicator N times with custom settings ─── */

  {type:'vwap',label:'VWAP',cat:'Volume',params:['color','lineWidth'],defaults:{color:'#f97316',lineWidth:2}},

  {type:'pivots',label:'Pivot Points',cat:'Levels',params:['color','lineWidth'],defaults:{color:'#94a3b8',lineWidth:1}},
  {type:'rsi',label:'RSI',cat:'Oscillators',params:['period','color'],defaults:{period:14,color:'#818cf8'}},
  {type:'atr',label:'ATR',cat:'Volatility',params:['period','color'],defaults:{period:14,color:'#f472b6'}},

  {type:'adx',label:'ADX',cat:'Trend',params:['period','color'],defaults:{period:14,color:'#fb923c'}},
];
const IND_PALETTE=['#f59e0b','#06b6d4','#8b5cf6','#ec4899','#14b8a6','#fb7185','#4ade80','#facc15','#6366f1','#22d3ee','#a855f7','#f97316','#818cf8','#34d399','#fb923c','#a78bfa'];
let indNextId=1;
let activeIndicators=[];  /* [{uid,type,cfg:{period,color,...}}, ...] */
let indSeries={};  /* uid -> series or [series,...] */

const INTERVALS=[
  {val:1,label:'1m'},{val:3,label:'3m'},{val:5,label:'5m'},
  {val:15,label:'15m'},{val:30,label:'30m'},{val:60,label:'1H'},
];
const CHART_TYPES=[
  {type:'candlestick',label:'Candlestick',emoji:'🕯️'},
  {type:'heikinashi',label:'Heikin Ashi',emoji:'🔶'},
  {type:'bar',label:'Bars (OHLC)',emoji:'📊'},
  {type:'line',label:'Line',emoji:'📈'},
  {type:'area',label:'Area',emoji:'🏔️'},
  {type:'hlc',label:'HLC Bars',emoji:'📉'},
];
const CT_LABELS={candlestick:'Candles',heikinashi:'HA',bar:'Bars',line:'Line',area:'Area',hlc:'HLC'};

/* ─── Themes ─── */
const THEMES = {
  dark:{label:'Dark',preview:['#131722','#1e222d','#26a69a','#ef5350'],
    clr:{bg:'#131722',up:'#26a69a',dn:'#ef5350',grid:'#1e222d',cross:'#363a45',text:'#787b86',session:'#2962ff'},cls:''},
  light:{label:'Light',preview:['#ffffff','#f0f3fa','#26a69a','#ef5350'],
    clr:{bg:'#ffffff',up:'#26a69a',dn:'#ef5350',grid:'#f0f3fa',cross:'#b2b5be',text:'#787b86',session:'#2962ff'},cls:'theme-light'},
  hc_dark:{label:'HC Dark',preview:['#000000','#111111','#00ff88','#ff3355'],
    clr:{bg:'#000000',up:'#00ff88',dn:'#ff3355',grid:'#111111',cross:'#555555',text:'#aaaaaa',session:'#00aaff'},cls:'theme-hc-dark'},
  hc_light:{label:'HC Light',preview:['#ffffff','#f5f5f5','#006600','#cc0000'],
    clr:{bg:'#ffffff',up:'#006600',dn:'#cc0000',grid:'#e8e8e8',cross:'#666666',text:'#333333',session:'#000099'},cls:'theme-hc-light'},
  solar:{label:'Solarized',preview:['#002b36','#073642','#859900','#dc322f'],
    clr:{bg:'#002b36',up:'#859900',dn:'#dc322f',grid:'#073642',cross:'#586e75',text:'#657b83',session:'#268bd2'},cls:'theme-solar'},
  custom:{label:'Custom',preview:['#131722','#1e222d','#26a69a','#ef5350'],
    clr:null,cls:''},
};
let activeClr = {...THEMES.dark.clr};
let savedVisRange=null,savedOverlaySyms=[];
function loadSettings(){
  try{const s=localStorage.getItem(STORE_KEY);if(s){const d=JSON.parse(s);activeClr={...THEMES.dark.clr,...d.clr};curTheme=d.theme||'dark';if(d.intv)curIntv=d.intv;if(d.type)curType=d.type;if(d.range)curRange=d.range;if(d.overlaySyms)savedOverlaySyms=d.overlaySyms;if(d.visRange)savedVisRange=d.visRange;if(d.sym)curSym=d.sym;if(d.optionMeta)optionMeta=d.optionMeta;if(d.chartMode)chartMode=d.chartMode;if(d.activeIndicators){activeIndicators=d.activeIndicators;indNextId=Math.max(1,...activeIndicators.map(i=>{const m=i.uid.match(/_(\d+)$/);return m?parseInt(m[1],10)+1:1;}))||1;}if(d.pine){setTimeout(()=>{const p=d.pine;['chkZigZag','chkHASmooth','chkLevels','chkSRBoxes'].forEach(k=>{const el=document.getElementById(k);if(el&&p[k]!==undefined)el.checked=p[k];});},0);}}}catch(e){}
}

  try{const pine={};['chkZigZag','chkHASmooth','chkLevels','chkSRBoxes'].forEach(k=>{const el=document.getElementById(k);if(el)pine[k]=el.checked;});const state={clr:activeClr,theme:curTheme,sym:curSym,intv:curIntv,type:curType,range:curRange,activeIndicators,overlaySyms:overlays.map(o=>o.symbol),optionMeta,chartMode,pine};try{if(chart)state.visRange=chart.timeScale().getVisibleRange();}catch(e){}localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}
}

/* ─── Session break primitive ─── */
class SessionBreakPrimitive{
  constructor(times,color){
    this._times=times;this._color=color||'rgba(100,149,237,0.5)';
    this._chart=null;this._paneView=new SessionBreakPaneView(this);
  }
  attached({chart}){this._chart=chart;}
  detached(){this._chart=null;}
  paneViews(){return[this._paneView];}
  updateAllViews(){this._paneView._renderer._dirty=true;}
  setTimes(times){this._times=times;this.updateAllViews();}
  setColor(color){this._color=color;}
}
class SessionBreakPaneView{
  constructor(p){this._p=p;this._renderer=new SessionBreakRenderer(p);}
  renderer(){return this._renderer;}
  zOrder(){return'bottom';}
}
class SessionBreakRenderer{
  constructor(p){this._p=p;this._dirty=false;}
  draw(target){
    const ch=this._p._chart;if(!ch)return;
    target.useBitmapCoordinateSpace(scope=>{
      const ctx=scope.context;
      ctx.save();
      ctx.strokeStyle=this._p._color;
      ctx.setLineDash([4,3]);
      ctx.lineWidth=Math.max(1,scope.horizontalPixelRatio);
      for(const t of this._p._times){
        const x=ch.timeScale().timeToCoordinate(t);
        if(x==null)continue;
        const bx=Math.round(x*scope.horizontalPixelRatio);
        ctx.beginPath();ctx.moveTo(bx,0);ctx.lineTo(bx,scope.bitmapSize.height);ctx.stroke();
      }
      ctx.restore();
    });
  }
}

/* ─── CHART INIT ─── */
function initChart(){
  const c=document.getElementById('chartContainer');
  c.innerHTML='';
  const cl=activeClr;
  chart=LightweightCharts.createChart(c,{
    width:c.clientWidth,height:c.clientHeight,
    layout:{background:{type:'solid',color:cl.bg},textColor:cl.text,
      fontFamily:'-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif',fontSize:11},
    grid:{vertLines:{color:cl.grid},horzLines:{color:cl.grid}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal,
      vertLine:{color:cl.cross,labelBackgroundColor:cl.cross,width:1,style:LightweightCharts.LineStyle.Dashed},
      horzLine:{color:cl.cross,labelBackgroundColor:cl.cross,width:1,style:LightweightCharts.LineStyle.Dashed}},
    rightPriceScale:{borderColor:cl.grid,autoScale:true,scaleMargins:{top:0.05,bottom:0.15},mode:0},
    leftPriceScale:{visible:false,borderColor:cl.grid,autoScale:true,scaleMargins:{top:0.05,bottom:0.15}},
    timeScale:{borderColor:cl.grid,timeVisible:true,secondsVisible:false,barSpacing:8,rightOffset:5},
    handleScroll:{mouseWheel:true,pressedMouseMove:true,horzTouchDrag:true,vertTouchDrag:true},
    handleScale:{mouseWheel:true,pinch:true,axisPressedMouseMove:true,axisDoubleClickReset:true},
  });
  new ResizeObserver(()=>{if(chart)chart.applyOptions({width:c.clientWidth,height:c.clientHeight});}).observe(c);
  chart.subscribeCrosshairMove(param=>{
    if(!param||!param.time||!rawCandles.length){if(rawCandles.length){updateOhlc(rawCandles[rawCandles.length-1]);updateOverlayOhlc(null);}return;}
    const cd=rawCandles.find(x=>x.time===param.time);updateOhlc(cd||rawCandles[rawCandles.length-1]);
    updateOverlayOhlc(param.time);
    /* Interactive preview while drawing */
    if(drawClicks.length>0&&param.point&&param.time){
      const price=mainSeries.coordinateToPrice(param.point.y);
      if(price!=null&&!isNaN(price))updateDrawPreview(param.time,price);
    }
  });
  chart.subscribeClick(param=>{

/* ─── TIMESTAMPS & FILTERING ─── */
function parseTs(ts){
  if(!ts)return 0;
  if(typeof ts==='number')return ts+IST_OFFSET;
  let s=String(ts).trim();
  if(!s.includes('Z')&&!s.includes('+')&&!/\d{2}:\d{2}:\d{2}\.\d+[-]/.test(s))s=s.replace(' ','T')+'Z';
  const d=new Date(s);if(isNaN(d.getTime()))return 0;
  return Math.floor(d.getTime()/1000)+IST_OFFSET;
}
function inTradingHours(time,sym){
  const d=new Date(time*1000);
  const mins=d.getUTCHours()*60+d.getUTCMinutes();
  const sess=getSessionMinutes(sym);
  const startMins=sess.startH*60+sess.startM;
  const endMins=sess.endH*60+sess.endM;
  return mins>=startMins&&mins<=endMins;
}
function getSessionBreakTimes(candles,sym){
  const sess=getSessionMinutes(sym);
  const endMins=sess.endH*60+sess.endM;
  const breaks=[];let prevDay=-1;
  for(const c of candles){
    const d=new Date(c.time*1000);
    const day=Math.floor(c.time/86400);
    const mins=d.getUTCHours()*60+d.getUTCMinutes();
    if(prevDay!==-1&&day!==prevDay)breaks.push(c.time);
    prevDay=day;
  }
  return breaks;
}

/* ─── DATA LOADING ─── */
function dateRange(){
  const now=new Date();let from;
  if(curRange==='today')from=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  else if(curRange==='2d')from=new Date(now.getTime()-2*864e5);
  else if(curRange==='7d')from=new Date(now.getTime()-7*864e5);
  else if(curRange==='30d')from=new Date(now.getTime()-30*864e5);
  else from=new Date(now.getTime()-90*864e5);
  return{from_ts:from.toISOString(),to_ts:now.toISOString()};
}

/* ─── Helper: aggregate raw ticks into OHLC candles ─── */
function aggregateTicks(ticks,intervalMin){
  if(!ticks||!ticks.length)return[];
  const bucketSec=intervalMin*60;const map={};
  for(const t of ticks){
    const ts=parseTs(t.ts||t.time);if(!ts)continue;
    const bk=Math.floor(ts/bucketSec)*bucketSec;
    const p=+(t.ltp||t.close||0);if(!p)continue;
    if(!map[bk])map[bk]={time:bk,open:p,high:p,low:p,close:p,volume:0};
    const c=map[bk];c.high=Math.max(c.high,p);c.low=Math.min(c.low,p);c.close=p;c.volume+=(+(t.volume||0));
  }
  return Object.values(map).sort((a,b)=>a.time-b.time);
}

async function loadData(opts){

    saveSettings();

    document.getElementById('dataStatus').textContent=m.includes('503')||m.includes('not available')?'Historical service unavailable':'Error: '+m;
  }finally{if(!silent)document.getElementById('chartLoading').style.display='none';}
}

function reapply(){
  if(!rawCandles.length||!mainSeries)return;
  const isOhlc=curType==='candlestick'||curType==='bar'||curType==='hlc'||curType==='heikinashi';
  // Determine source data based on chart mode
  let sourceCandles=rawCandles;
  if(chartMode==='combined'&&overlays.length)sourceCandles=calcCombinedCandles();
  // Apply Heikin Ashi transformation if needed
  let displayCandles=sourceCandles;
  if(curType==='heikinashi')displayCandles=calcHeikinAshi(sourceCandles);
  if(isOhlc)mainSeries.setData(displayCandles);
  else mainSeries.setData(displayCandles.map(c=>({time:c.time,value:c.close})));
  if(volSeries){
    volSeries.setData(displayCandles.map(c=>({time:c.time,value:c.volume,color:c.close>=c.open?hexRgba(activeClr.up,.35):hexRgba(activeClr.dn,.35)})));
  }
  // Apply indicators on the source candles (combined or raw, before HA transform)
  applyIndicators(sourceCandles);
  applyPineIndicators(sourceCandles);
  applySessionBreaks();
  // Restore price lines
  priceLines=priceLines.map(e=>{
    try{const pl=mainSeries.createPriceLine(e.opts);return{priceLine:pl,opts:e.opts};}catch(x){return e;}
  }).filter(Boolean);
}

/* ─── SESSION BREAKS ─── */
function applySessionBreaks(){
  if(!mainSeries)return;
  // Remove old primitive
  try{if(sessionBreakPrimitive)mainSeries.detachPrimitive(sessionBreakPrimitive);}catch(e){}
  sessionBreakPrimitive=null;
  if(!document.getElementById('chkBreaks').checked||rawCandles.length<2)return;
  const breakTimes=getSessionBreakTimes(rawCandles,curSym);
  if(!breakTimes.length)return;
  sessionBreakPrimitive=new SessionBreakPrimitive(breakTimes,hexRgba(activeClr.session,.5));
  try{mainSeries.attachPrimitive(sessionBreakPrimitive);}catch(e){
    // Fallback: draw as histogram markers
    console.warn('attachPrimitive not supported, using marker fallback');
  }
}

async function loadOverlayData(sym){
  try{
    const rng=dateRange();
    const meta=optionMeta[sym];
    let url;
    if(meta){
      url=API+'/historical/option-ticks?symbol='+encodeURIComponent(meta.symbol)+'&expiry='+encodeURIComponent(meta.expiry)+'&strike='+meta.strike+'&option_type='+encodeURIComponent(meta.option_type)+'&from_ts='+encodeURIComponent(rng.from_ts)+'&to_ts='+encodeURIComponent(rng.to_ts)+'&limit=50000';
    }else{
      url=API+'/historical/index-ohlc?symbol='+encodeURIComponent(sym)+'&interval='+curIntv+'&from_ts='+encodeURIComponent(rng.from_ts)+'&to_ts='+encodeURIComponent(rng.to_ts)+'&limit=50000';
    }
    const data=await fetchJSON(url);if(!data)return[];
    let candles;
    if(meta){
      candles=aggregateTicks(data.ticks||[],curIntv);
    }else{
      candles=(data.candles||[]).map(c=>{
        const t=parseTs(c.bucket||c.ts);
        return{time:t,open:c.open!=null?+c.open:+c.close,high:+c.high,low:+c.low,close:c.close!=null?+c.close:+c.high,volume:+(c.volume||0)};
      }).filter(c=>c.time&&c.high>0);
    }
    candles.sort((a,b)=>a.time-b.time);
    const r=[];const seen=new Set();
    for(const c of candles){if(!seen.has(c.time)){seen.add(c.time);r.push(c);}}
    return r;
  }catch(e){return[];}
}

/* ─── INDICATOR CALCULATIONS ─── */
function calcSMA(data,p){const r=[];for(let i=p-1;i<data.length;i++){let s=0;for(let j=i-p+1;j<=i;j++)s+=data[j].close;r.push({time:data[i].time,value:s/p});}return r;}
function calcEMA(data,p){if(data.length<p)return[];const k=2/(p+1);let s=0;for(let i=0;i<p;i++)s+=data[i].close;let e=s/p;const r=[{time:data[p-1].time,value:e}];for(let i=p;i<data.length;i++){e=data[i].close*k+e*(1-k);r.push({time:data[i].time,value:e});}return r;}
function calcWMA(data,p){const r=[],d=p*(p+1)/2;for(let i=p-1;i<data.length;i++){let s=0;for(let j=0;j<p;j++)s+=data[i-p+1+j].close*(j+1);r.push({time:data[i].time,value:s/d});}return r;}
function calcDEMA(data,p){const e1=calcEMA(data,p);if(e1.length<p)return[];const m=data.length-e1.length;const e2=calcEMA(e1.map((x,i)=>({...data[m+i],close:x.value})),p);const r=[],off=e1.length-e2.length;for(let i=0;i<e2.length;i++)r.push({time:e2[i].time,value:2*e1[i+off].value-e2[i].value});return r;}
function calcBB(data,p,sd){const u=[],l=[],m=[];for(let i=p-1;i<data.length;i++){let s=0;for(let j=i-p+1;j<=i;j++)s+=data[j].close;const avg=s/p;let sq=0;for(let j=i-p+1;j<=i;j++)sq+=(data[j].close-avg)**2;const std=Math.sqrt(sq/p);m.push({time:data[i].time,value:avg});u.push({time:data[i].time,value:avg+sd*std});l.push({time:data[i].time,value:avg-sd*std});}return{upper:u,mid:m,lower:l};}
function calcVWAP(data){let cTPV=0,cV=0;const r=[];let ld=null;for(const c of data){const d=new Date(c.time*1000),day=d.getUTCFullYear()*10000+(d.getUTCMonth()+1)*100+d.getUTCDate();if(day!==ld){cTPV=0;cV=0;ld=day;}const tp=(c.high+c.low+c.close)/3,v=c.volume||1;cTPV+=tp*v;cV+=v;r.push({time:c.time,value:cV>0?cTPV/cV:tp});}return r;}
function calcKeltner(data,p,mult){const em=calcEMA(data,p);if(!em.length)return{upper:[],mid:[],lower:[]};const u=[],l=[];for(let i=0;i<em.length;i++){const idx=data.length-em.length+i;let as=0,cn=0;for(let j=Math.max(1,idx-p+1);j<=idx;j++){const tr=Math.max(data[j].high-data[j].low,Math.abs(data[j].high-data[j-1].close),Math.abs(data[j].low-data[j-1].close));as+=tr;cn++;}const atr=cn>0?as/cn:0;u.push({time:em[i].time,value:em[i].value+mult*atr});l.push({time:em[i].time,value:em[i].value-mult*atr});}return{upper:u,mid:em,lower:l};}
function calcDonchian(data,p){const u=[],l=[],m=[];for(let i=p-1;i<data.length;i++){let hi=-Infinity,lo=Infinity;for(let j=i-p+1;j<=i;j++){hi=Math.max(hi,data[j].high);lo=Math.min(lo,data[j].low);}u.push({time:data[i].time,value:hi});l.push({time:data[i].time,value:lo});m.push({time:data[i].time,value:(hi+lo)/2});}return{upper:u,mid:m,lower:l};}
function calcPSAR(data,step,maxAf){if(data.length<2)return[];const r=[];let af=step,isU=data[1].close>data[0].close;let sar=isU?data[0].low:data[0].high,ep=isU?data[1].high:data[1].low;r.push({time:data[0].time,value:sar});for(let i=1;i<data.length;i++){sar+=af*(ep-sar);if(isU){if(i>=2)sar=Math.min(sar,data[i-1].low,data[i-2].low);if(data[i].low<sar){isU=false;sar=ep;ep=data[i].low;af=step;}else if(data[i].high>ep){ep=data[i].high;af=Math.min(af+step,maxAf);}}else{if(i>=2)sar=Math.max(sar,data[i-1].high,data[i-2].high);if(data[i].high>sar){isU=true;sar=ep;ep=data[i].high;af=step;}else if(data[i].low<ep){ep=data[i].low;af=Math.min(af+step,maxAf);}}r.push({time:data[i].time,value:sar});}return r;}
function calcPivots(data){const dm={};for(const c of data){const d=new Date(c.time*1000),k=d.getUTCFullYear()*10000+(d.getUTCMonth()+1)*100+d.getUTCDate();if(!dm[k])dm[k]={high:-Infinity,low:Infinity,close:0,candles:[]};dm[k].high=Math.max(dm[k].high,c.high);dm[k].low=Math.min(dm[k].low,c.low);dm[k].close=c.close;dm[k].candles.push(c);}const days=Object.keys(dm).sort(),pv=[],s1=[],r1=[],s2=[],r2=[];for(let i=1;i<days.length;i++){const prev=dm[days[i-1]],pp=(prev.high+prev.low+prev.close)/3,sup1=2*pp-prev.high,res1=2*pp-prev.low,sup2=pp-(prev.high-prev.low),res2=pp+(prev.high-prev.low);for(const c of dm[days[i]].candles){pv.push({time:c.time,value:pp});s1.push({time:c.time,value:sup1});r1.push({time:c.time,value:res1});s2.push({time:c.time,value:sup2});r2.push({time:c.time,value:res2});}}return{pivot:pv,s1,r1,s2,r2};}
function calcSupertrend(data,period,mult){if(data.length<period)return{up:[],dn:[]};const atr=[];for(let i=0;i<data.length;i++){if(i===0){atr.push(data[0].high-data[0].low);continue;}const tr=Math.max(data[i].high-data[i].low,Math.abs(data[i].high-data[i-1].close),Math.abs(data[i].low-data[i-1].close));atr.push(tr);}const satr=[];let sm=0;for(let i=0;i<period;i++)sm+=atr[i];satr.push(sm/period);for(let i=period;i<data.length;i++)satr.push((satr[satr.length-1]*(period-1)+atr[i])/period);const off=period-1,uB=[],dB=[],trend=[];for(let i=0;i<satr.length;i++){const di=i+off,hl2=(data[di].high+data[di].low)/2;let ub=hl2+mult*satr[i],lb=hl2-mult*satr[i];if(i>0){ub=data[di].close>uB[i-1]?ub:Math.min(ub,uB[i-1]);lb=data[di].close<dB[i-1]?lb:Math.max(lb,dB[i-1]);}uB.push(ub);dB.push(lb);if(i===0){trend.push(data[di].close>ub?-1:1);}else{const pt=trend[i-1];if(pt===1&&data[di].close>uB[i])trend.push(-1);else if(pt===-1&&data[di].close<dB[i])trend.push(1);else trend.push(pt);}}const up=[],dn=[];for(let i=0;i<trend.length;i++){const di=i+off;if(trend[i]===1)dn.push({time:data[di].time,value:uB[i]});else up.push({time:data[di].time,value:dB[i]});}return{up,dn};}
function calcRSI(data,p){if(data.length<p+1)return[];let gains=0,losses=0;for(let i=1;i<=p;i++){const d=data[i].close-data[i-1].close;if(d>0)gains+=d;else losses-=d;}let avgG=gains/p,avgL=losses/p;const r=[{time:data[p].time,value:avgL===0?100:100-(100/(1+avgG/avgL))}];for(let i=p+1;i<data.length;i++){const d=data[i].close-data[i-1].close;avgG=(avgG*(p-1)+(d>0?d:0))/p;avgL=(avgL*(p-1)+(d<0?-d:0))/p;r.push({time:data[i].time,value:avgL===0?100:100-(100/(1+avgG/avgL))});}return r;}
function calcATR(data,p){if(data.length<p+1)return[];const trs=[];for(let i=1;i<data.length;i++){trs.push(Math.max(data[i].high-data[i].low,Math.abs(data[i].high-data[i-1].close),Math.abs(data[i].low-data[i-1].close)));}const r=[];let atr=trs.slice(0,p).reduce((a,b)=>a+b,0)/p;r.push({time:data[p].time,value:atr});for(let i=p;i<trs.length;i++){atr=(atr*(p-1)+trs[i])/p;r.push({time:data[i+1].time,value:atr});}return r;}
function calcCCI(data,p){const r=[];for(let i=p-1;i<data.length;i++){let sm=0;for(let j=i-p+1;j<=i;j++)sm+=(data[j].high+data[j].low+data[j].close)/3;const avg=sm/p;let md=0;for(let j=i-p+1;j<=i;j++)md+=Math.abs((data[j].high+data[j].low+data[j].close)/3-avg);md/=p;const tp=(data[i].high+data[i].low+data[i].close)/3;r.push({time:data[i].time,value:md===0?0:(tp-avg)/(0.015*md)});}return r;}
function calcADX(data,p){if(data.length<p*2)return[];const dmP=[],dmM=[],tr=[];for(let i=1;i<data.length;i++){const upMove=data[i].high-data[i-1].high,downMove=data[i-1].low-data[i].low;dmP.push(upMove>downMove&&upMove>0?upMove:0);dmM.push(downMove>upMove&&downMove>0?downMove:0);tr.push(Math.max(data[i].high-data[i].low,Math.abs(data[i].high-data[i-1].close),Math.abs(data[i].low-data[i-1].close)));}let sTR=tr.slice(0,p).reduce((a,b)=>a+b,0),sDMP=dmP.slice(0,p).reduce((a,b)=>a+b,0),sDMM=dmM.slice(0,p).reduce((a,b)=>a+b,0);const r=[];for(let i=p;i<tr.length;i++){sTR=sTR-sTR/p+tr[i];sDMP=sDMP-sDMP/p+dmP[i];sDMM=sDMM-sDMM/p+dmM[i];const diP=100*sDMP/sTR,diM=100*sDMM/sTR,dx=Math.abs(diP-diM)/(diP+diM)*100;r.push({time:data[i+1].time,value:dx});}return r;}

/* ─── HEIKIN ASHI CALCULATION ─── */
function calcHeikinAshi(candles){
  if(!candles.length)return[];
  const ha=[];
  for(let i=0;i<candles.length;i++){
    const c=candles[i];
    const haClose=(c.open+c.high+c.low+c.close)/4;
    const haOpen=i===0?(c.open+c.close)/2:(ha[i-1].open+ha[i-1].close)/2;
    const haHigh=Math.max(c.high,haOpen,haClose);
    const haLow=Math.min(c.low,haOpen,haClose);
    ha.push({time:c.time,open:haOpen,high:haHigh,low:haLow,close:haClose,volume:c.volume||0});
  }
  return ha;
}
