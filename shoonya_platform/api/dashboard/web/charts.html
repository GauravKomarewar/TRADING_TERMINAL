<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charts – Shoonya OMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/dashboard/web/styles/common.css">
    <link rel="stylesheet" href="/dashboard/web/shared/layout.css">
    <script src="/dashboard/web/shared/pages-config.js" defer></script>
    <script src="/dashboard/web/shared/layout.js" defer></script>
    <!-- TradingView Lightweight Charts v4 (open-source, Apache-2.0) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{padding:60px 0 0;line-height:1.5;overflow:hidden;height:100vh}
        main{display:flex;flex-direction:column;height:calc(100vh - 60px);background:#131722}

        /* ── Top Toolbar ── */
        .tv-toolbar{display:flex;align-items:center;gap:0;background:#1e222d;border-bottom:1px solid #2a2e39;height:38px;padding:0 8px;flex-shrink:0;overflow-x:auto}
        .tv-toolbar .tv-sep{width:1px;height:24px;background:#2a2e39;margin:0 6px;flex-shrink:0}
        .tv-btn{display:flex;align-items:center;justify-content:center;height:28px;padding:0 8px;background:transparent;color:#787b86;border:none;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;font-family:inherit}
        .tv-btn:hover{background:#2a2e39;color:#d1d4dc}
        .tv-btn.active{color:#2962ff;background:rgba(41,98,255,.1)}
        .tv-btn svg{width:16px;height:16px;fill:currentColor}

        /* Symbol button */
        .tv-symbol-btn{font-size:14px;font-weight:700;color:#d1d4dc;padding:0 10px;gap:6px}
        .tv-symbol-btn:hover{color:#fff}

        /* Dropdown wrapper */
        .tv-dd{position:relative}
        .tv-dd-menu{position:absolute;top:34px;left:0;background:#1e222d;border:1px solid #363a45;border-radius:6px;padding:4px 0;z-index:150;min-width:140px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.55)}
        .tv-dd.open .tv-dd-menu{display:block}
        .tv-dd-item{display:flex;align-items:center;gap:8px;padding:6px 14px;color:#d1d4dc;font-size:12px;cursor:pointer;transition:background .1s}
        .tv-dd-item:hover{background:#2a2e39}
        .tv-dd-item.active{color:#2962ff}
        .tv-dd-item .dd-check{width:14px;height:14px;border:1.5px solid #363a45;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
        .tv-dd-item.active .dd-check{background:#2962ff;border-color:#2962ff;color:#fff}
        .tv-dd-item .dd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

        /* ── Left Drawing Tools ── */
        .tv-draw-bar{display:flex;flex-direction:column;align-items:center;gap:1px;background:#1e222d;border-right:1px solid #2a2e39;padding:6px 2px;width:36px;flex-shrink:0}
        .tv-draw-btn{width:30px;height:30px;background:transparent;border:none;border-radius:4px;color:#787b86;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative}
        .tv-draw-btn:hover{background:#2a2e39;color:#d1d4dc}
        .tv-draw-btn.active{color:#2962ff;background:rgba(41,98,255,.12)}
        .tv-draw-btn svg{width:18px;height:18px;fill:currentColor}
        .tv-draw-btn .tv-draw-tip{position:absolute;left:36px;top:50%;transform:translateY(-50%);background:#363a45;color:#d1d4dc;font-size:11px;padding:3px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20}
        .tv-draw-btn:hover .tv-draw-tip{opacity:1}
        .tv-draw-sep{width:22px;height:1px;background:#2a2e39;margin:4px 0}

        /* ── Chart Area ── */
        .tv-body{display:flex;flex:1;overflow:hidden}
        .tv-chart-area{flex:1;position:relative;overflow:hidden}
        .tv-chart-container{width:100%;height:100%}

        /* OHLC overlay */
        .tv-ohlc{position:absolute;top:8px;left:12px;z-index:5;pointer-events:none;display:flex;align-items:center;gap:6px;font-size:12px;font-family:'Trebuchet MS',sans-serif}
        .tv-ohlc .ohlc-sym{font-weight:700;color:#d1d4dc;font-size:15px;margin-right:4px}
        .tv-ohlc .ohlc-interval{color:#787b86;font-size:11px;margin-right:8px}
        .tv-ohlc .ohlc-label{color:#787b86;margin-right:2px}
        .tv-ohlc .ohlc-val{margin-right:6px}
        .tv-ohlc .ohlc-vol{color:#787b86}
        .tv-ohlc .up{color:#26a69a}
        .tv-ohlc .down{color:#ef5350}

        /* Zoom controls — center bottom */
        .tv-zoom-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:1px;background:#1e222d;border:1px solid #2a2e39;border-radius:6px;padding:2px;opacity:.7;transition:opacity .2s}
        .tv-zoom-bar:hover{opacity:1}
        .tv-zoom-btn{width:24px;height:24px;background:transparent;border:none;border-radius:4px;color:#787b86;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;transition:all .12s}
        .tv-zoom-btn:hover{background:#2a2e39;color:#d1d4dc}
        .tv-zoom-btn svg{width:14px;height:14px;fill:currentColor}

        /* Settings gear — bottom right */
        .tv-gear{position:absolute;bottom:8px;right:8px;z-index:5;width:28px;height:28px;background:#1e222d;border:1px solid #2a2e39;border-radius:50%;color:#787b86;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;opacity:.7}
        .tv-gear:hover{opacity:1;color:#d1d4dc;border-color:#363a45}
        .tv-gear svg{width:16px;height:16px;fill:currentColor}

        /* Range bar */
        .tv-range-bar{display:flex;align-items:center;gap:0;background:#1e222d;border-top:1px solid #2a2e39;height:28px;padding:0 8px;flex-shrink:0}
        .tv-range-btn{height:22px;padding:0 8px;background:transparent;color:#787b86;border:none;border-radius:3px;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s}
        .tv-range-btn:hover{color:#d1d4dc}
        .tv-range-btn.active{color:#2962ff;background:rgba(41,98,255,.1)}
        .tv-range-bar .tv-sep{width:1px;height:16px;background:#2a2e39;margin:0 4px}
        .tv-range-bar .tv-status{margin-left:auto;font-size:11px;color:#787b86}

        /* Loading */
        .tv-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(19,23,34,.8);color:#787b86;font-size:13px;z-index:10;pointer-events:none}

        /* ── Modal ── */
        .tv-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
        .tv-modal.open{display:flex}
        .tv-modal-box{background:#1e222d;border:1px solid #2a2e39;border-radius:8px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5)}
        .tv-modal-hdr{padding:12px 16px;border-bottom:1px solid #2a2e39;display:flex;align-items:center;justify-content:space-between}
        .tv-modal-hdr h3{font-size:14px;font-weight:600;color:#d1d4dc;margin:0}
        .tv-modal-close{background:none;border:none;color:#787b86;cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px}
        .tv-modal-close:hover{background:#2a2e39;color:#d1d4dc}

        /* Symbol modal */
        .tv-sym-search input{width:100%;padding:8px 12px;background:#131722;border:1px solid #363a45;color:#d1d4dc;border-radius:6px;font-size:14px;outline:none}
        .tv-sym-search input:focus{border-color:#2962ff}
        .tv-sym-list{overflow-y:auto;max-height:400px;padding:4px 0}
        .tv-sym-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .1s;color:#d1d4dc;font-size:13px}
        .tv-sym-item:hover{background:#2a2e39}
        .tv-sym-item.active{background:rgba(41,98,255,.1);color:#2962ff}
        .tv-sym-item .sym-name{font-weight:600;flex:1}
        .tv-sym-item .sym-desc{font-size:11px;color:#787b86;flex:2}
        .tv-sym-item .sym-exch{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(41,98,255,.1);color:#2962ff}
        .tv-sym-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .tv-sym-dot.live{background:#26a69a}
        .tv-sym-dot.off{background:#363a45}

        /* Settings panel */
        .tv-settings-body{padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:500px}
        .tv-settings-section{border-bottom:1px solid #2a2e39;padding-bottom:12px}
        .tv-settings-section:last-child{border-bottom:none;padding-bottom:0}
        .tv-settings-title{font-size:11px;font-weight:700;color:#787b86;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
        .tv-settings-row{display:flex;align-items:center;justify-content:space-between;color:#d1d4dc;font-size:13px;margin-bottom:6px}
        .tv-settings-row:last-child{margin-bottom:0}
        .tv-settings-row input[type=checkbox]{width:16px;height:16px;accent-color:#2962ff}
        .tv-settings-row select{padding:4px 8px;background:#131722;border:1px solid #363a45;color:#d1d4dc;border-radius:4px;font-size:12px}
        .tv-settings-row input[type=color]{width:28px;height:22px;border:1px solid #363a45;border-radius:4px;background:#131722;cursor:pointer;padding:0}

        @media(max-width:768px){
            body{padding-top:48px}
            main{height:calc(100vh - 48px)}
            .tv-toolbar{height:34px;padding:0 4px}
            .tv-btn{font-size:11px;height:24px;padding:0 5px}
            .tv-draw-bar{width:30px;padding:4px 1px}
            .tv-draw-btn{width:26px;height:26px}
            .tv-modal-box{width:95%!important;margin:0 10px}
        }
    </style>
</head>
<body data-page="charts">
<div id="app-header"></div>
<main>
    <!-- Top Toolbar -->
    <div class="tv-toolbar">
        <!-- Symbol -->
        <button class="tv-btn tv-symbol-btn" id="btnSymbol" title="Search symbol">
            <span id="toolbarSymbol">NIFTY</span>
            <svg viewBox="0 0 16 16" style="width:10px;height:10px;margin-left:2px"><path d="M4 6l4 4 4-4z"/></svg>
        </button>
        <div class="tv-sep"></div>

        <!-- Interval dropdown -->
        <div class="tv-dd" id="ddInterval">
            <button class="tv-btn" id="btnInterval">
                <span id="lblInterval">3m</span>
                <svg viewBox="0 0 16 16" style="width:8px;height:8px;margin-left:4px"><path d="M4 6l4 4 4-4z"/></svg>
            </button>
            <div class="tv-dd-menu" id="menuInterval">
                <div class="tv-dd-item" data-val="1">1 minute</div>
                <div class="tv-dd-item active" data-val="3">3 minutes</div>
                <div class="tv-dd-item" data-val="5">5 minutes</div>
                <div class="tv-dd-item" data-val="15">15 minutes</div>
                <div class="tv-dd-item" data-val="30">30 minutes</div>
                <div class="tv-dd-item" data-val="60">1 hour</div>
            </div>
        </div>
        <div class="tv-sep"></div>

        <!-- Chart Type dropdown -->
        <div class="tv-dd" id="ddChartType">
            <button class="tv-btn" id="btnChartType" title="Chart type">
                <svg viewBox="0 0 28 28" id="chartTypeIcon"><path d="M17 11v6h3v-6h-3zm-7-4v10h3V7h-3zm-7 6v4h3v-4H3z"/></svg>
                <svg viewBox="0 0 16 16" style="width:8px;height:8px;margin-left:3px"><path d="M4 6l4 4 4-4z"/></svg>
            </button>
            <div class="tv-dd-menu" id="menuChartType">
                <div class="tv-dd-item active" data-type="candlestick">&#x1F5C2; Candlestick</div>
                <div class="tv-dd-item" data-type="line">&#x1F4C8; Line</div>
                <div class="tv-dd-item" data-type="area">&#x1F4CA; Area</div>
                <div class="tv-dd-item" data-type="bar">&#x1F4CA; Bars (OHLC)</div>
            </div>
        </div>
        <div class="tv-sep"></div>

        <!-- Indicators dropdown -->
        <div class="tv-dd" id="ddIndicators">
            <button class="tv-btn" id="btnIndicators">
                <svg viewBox="0 0 28 28" style="width:16px;height:16px;fill:currentColor"><path d="M3.5 20.5l6-6 4 4L22 10m-5.5 0H22v5.5"/></svg>
                <span style="margin-left:4px">Indicators</span>
                <svg viewBox="0 0 16 16" style="width:8px;height:8px;margin-left:4px"><path d="M4 6l4 4 4-4z"/></svg>
            </button>
            <div class="tv-dd-menu" id="menuIndicators" style="min-width:240px;max-height:400px;overflow-y:auto;padding:6px"></div>
        </div>
        <div class="tv-sep"></div>

        <!-- Log scale -->
        <button class="tv-btn" id="btnLogScale" title="Logarithmic scale">Log</button>
    </div>

    <!-- Body: Drawing tools + Chart -->
    <div class="tv-body">
        <!-- Left Drawing Tools -->
        <div class="tv-draw-bar">
            <button class="tv-draw-btn active" data-tool="pointer" title="Pointer">
                <svg viewBox="0 0 24 24"><path d="M7 2l10 10h-6l4 9-2 1-4-9-4 4z"/></svg>
                <span class="tv-draw-tip">Pointer</span>
            </button>
            <button class="tv-draw-btn" data-tool="crosshairTool" title="Crosshair">
                <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
                <span class="tv-draw-tip">Crosshair</span>
            </button>
            <div class="tv-draw-sep"></div>
            <button class="tv-draw-btn" data-tool="hline" title="Horizontal line">
                <svg viewBox="0 0 24 24"><path d="M2 12h20" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                <span class="tv-draw-tip">Horizontal Line</span>
            </button>
            <button class="tv-draw-btn" data-tool="trendline" title="Trend line">
                <svg viewBox="0 0 24 24"><path d="M4 20L20 4" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                <span class="tv-draw-tip">Trend Line</span>
            </button>
            <button class="tv-draw-btn" data-tool="hray" title="Horizontal ray">
                <svg viewBox="0 0 24 24"><path d="M2 12h14m2 0l4 0" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="2 2"/><circle cx="4" cy="12" r="2" fill="currentColor"/></svg>
                <span class="tv-draw-tip">Ray</span>
            </button>
            <div class="tv-draw-sep"></div>
            <button class="tv-draw-btn" data-tool="fib" title="Fibonacci retracement">
                <svg viewBox="0 0 24 24"><path d="M4 4h16M4 9h16M4 14h16M4 20h16" stroke="currentColor" stroke-width="1.5" fill="none" opacity=".6"/><path d="M4 4v16" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                <span class="tv-draw-tip">Fibonacci</span>
            </button>
            <button class="tv-draw-btn" data-tool="rect" title="Rectangle">
                <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="1" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                <span class="tv-draw-tip">Rectangle</span>
            </button>
            <div class="tv-draw-sep"></div>
            <button class="tv-draw-btn" data-tool="text" title="Text label">
                <svg viewBox="0 0 24 24"><path d="M5 4h14M12 4v16M8 20h8" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                <span class="tv-draw-tip">Text</span>
            </button>
            <button class="tv-draw-btn" data-tool="clearAll" title="Remove all drawings" style="margin-top:auto">
                <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                <span class="tv-draw-tip">Clear All</span>
            </button>
        </div>

        <!-- Chart -->
        <div class="tv-chart-area">
            <!-- OHLC Overlay -->
            <div class="tv-ohlc" id="ohlcOverlay">
                <span class="ohlc-sym" id="ohlcSym">NIFTY</span>
                <span class="ohlc-interval" id="ohlcInterval">3m</span>
                <span class="ohlc-label">O</span><span class="ohlc-val" id="ohlcO">—</span>
                <span class="ohlc-label">H</span><span class="ohlc-val" id="ohlcH">—</span>
                <span class="ohlc-label">L</span><span class="ohlc-val" id="ohlcL">—</span>
                <span class="ohlc-label">C</span><span class="ohlc-val" id="ohlcC">—</span>
                <span class="ohlc-vol" id="ohlcVol"></span>
            </div>

            <!-- Zoom — center bottom -->
            <div class="tv-zoom-bar">
                <button class="tv-zoom-btn" id="btnZoomOut" title="Zoom out">&minus;</button>
                <button class="tv-zoom-btn" id="btnFitAll" title="Reset">
                    <svg viewBox="0 0 16 16"><path d="M2 2v5h2V4h3V2H2zm9 0v2h3v3h2V2h-5zM4 11H2v5h5v-2H4v-3zm12 0h-2v3h-3v2h5v-5z"/></svg>
                </button>
                <button class="tv-zoom-btn" id="btnZoomIn" title="Zoom in">+</button>
            </div>

            <!-- Settings gear — bottom right -->
            <button class="tv-gear" id="btnGear" title="Chart settings">
                <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7zm7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.3 7.3 0 0 0-1.69-.98l-.38-2.65A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.49.49 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.65.07.97l-2.11 1.66a.5.5 0 0 0-.12.63l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.05.24.26.42.49.42h4c.24 0 .44-.18.49-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65z"/></svg>
            </button>

            <div class="tv-chart-container" id="chartContainer"></div>
            <div class="tv-loading" id="chartLoading" style="display:none">Loading chart data…</div>
        </div>
    </div>

    <!-- Bottom Range Bar -->
    <div class="tv-range-bar">
        <button class="tv-range-btn" data-range="today">Today</button>
        <button class="tv-range-btn" data-range="2d">2D</button>
        <button class="tv-range-btn active" data-range="7d">7D</button>
        <button class="tv-range-btn" data-range="30d">1M</button>
        <div class="tv-sep"></div>
        <span class="tv-status" id="dataStatus"></span>
    </div>
</main>

<!-- Symbol Search Modal -->
<div class="tv-modal" id="symModal">
    <div class="tv-modal-box" style="width:420px;max-height:500px">
        <div class="tv-sym-search" style="padding:12px 16px;border-bottom:1px solid #2a2e39">
            <input type="text" id="symSearchInput" placeholder="Search symbol…" autocomplete="off" spellcheck="false">
        </div>
        <div class="tv-sym-list" id="symList"></div>
    </div>
</div>

<!-- Settings Modal -->
<div class="tv-modal" id="settingsModal">
    <div class="tv-modal-box" style="width:380px">
        <div class="tv-modal-hdr">
            <h3>⚙ Chart Settings</h3>
            <button class="tv-modal-close" id="btnCloseSettings">&times;</button>
        </div>
        <div class="tv-settings-body">
            <!-- General -->
            <div class="tv-settings-section">
                <div class="tv-settings-title">General</div>
                <label class="tv-settings-row">Session break markers<input type="checkbox" id="chkSessionBreaks" checked></label>
                <label class="tv-settings-row">Auto-refresh (10s)<input type="checkbox" id="chkAutoRefresh" checked></label>
                <label class="tv-settings-row">Show volume<input type="checkbox" id="chkVolume" checked></label>
                <label class="tv-settings-row">Crosshair
                    <select id="selCrosshair"><option value="normal">Normal</option><option value="magnet">Magnet</option></select>
                </label>
            </div>
            <!-- Colors -->
            <div class="tv-settings-section">
                <div class="tv-settings-title">Colors</div>
                <label class="tv-settings-row">Background<input type="color" id="clrBg" value="#131722"></label>
                <label class="tv-settings-row">Up candle<input type="color" id="clrUp" value="#26a69a"></label>
                <label class="tv-settings-row">Down candle<input type="color" id="clrDown" value="#ef5350"></label>
                <label class="tv-settings-row">Grid lines<input type="color" id="clrGrid" value="#1e222d"></label>
                <label class="tv-settings-row">Crosshair<input type="color" id="clrCross" value="#363a45"></label>
                <label class="tv-settings-row">Text<input type="color" id="clrText" value="#787b86"></label>
            </div>
            <!-- Scale -->
            <div class="tv-settings-section">
                <div class="tv-settings-title">Scale</div>
                <label class="tv-settings-row">Price scale mode
                    <select id="selScaleMode">
                        <option value="0">Normal</option>
                        <option value="1">Logarithmic</option>
                        <option value="2">Percentage</option>
                        <option value="3">Indexed to 100</option>
                    </select>
                </label>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
                <button class="tv-btn" id="btnResetColors" style="color:#ef5350">Reset defaults</button>
                <button class="tv-btn" id="btnApplySettings" style="background:#2962ff;color:#fff;padding:6px 16px;border-radius:4px">Apply</button>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
'use strict';

const API = '/dashboard';
const IST_OFFSET = 19800;
const STORAGE_KEY = 'tv_chart_settings';

/* ── Helpers ── */
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function fetchJSON(url, opts) {
    const r = await fetch(url, { credentials:'include', ...opts });
    if (r.status === 401 || r.status === 403) { window.location.href = '/'; return null; }
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.statusText); }
    return r.json();
}

function fmt(n) {
    n = +n; if (isNaN(n)) return '—';
    return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtVol(v) {
    v = +v; if (isNaN(v) || v === 0) return '';
    if (v >= 10000000) return (v/10000000).toFixed(2)+'Cr';
    if (v >= 100000) return (v/100000).toFixed(2)+'L';
    if (v >= 1000) return (v/1000).toFixed(1)+'K';
    return v.toString();
}

function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
}

function initChart() {
    const container = document.getElementById('chartContainer');
    container.innerHTML = '';

    chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,
        layout: {
            background: { type: 'solid', color: colors.bg },
            textColor: colors.text,
            fontFamily: '-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif',
            fontSize: 11,
        },
        grid: {
            vertLines: { color: colors.grid },
            horzLines: { color: colors.grid },
        },
        crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { color: colors.cross, labelBackgroundColor: '#2962ff', width: 1, style: LightweightCharts.LineStyle.Dashed },
            horzLine: { color: colors.cross, labelBackgroundColor: '#2962ff', width: 1, style: LightweightCharts.LineStyle.Dashed },
        },
        rightPriceScale: {
            borderColor: '#2a2e39',
            scaleMargins: { top: 0.08, bottom: 0.2 },
            mode: 0,
        },
        timeScale: {
            borderColor: '#2a2e39',
            timeVisible: true,
            secondsVisible: false,
            barSpacing: 8,
            rightOffset: 5,
        },
        handleScroll: { mouseWheel: true, pressedMouseMove: true },
        handleScale: { mouseWheel: true, pinch: true, axisPressedMouseMove: true },
    });

    const ro = new ResizeObserver(() => {
        if (chart) chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    });
    ro.observe(container);

    chart.subscribeCrosshairMove(param => {
        if (!param || !param.time || !rawCandles.length) { updateOhlcOverlay(rawCandles[rawCandles.length-1]); return; }
        const candle = rawCandles.find(c => c.time === param.time);
        updateOhlcOverlay(candle || rawCandles[rawCandles.length-1]);
    });

    // Click handler for drawing tools
    chart.subscribeClick(param => {
        if (!param || !param.time || !mainSeries) return;
        const price = mainSeries.coordinateToPrice(param.point.y);
        if (price == null || isNaN(price)) return;
        handleChartClick(param.time, price);
    });

    createMainSeries();
}

function updateOhlcOverlay(c) {
    if (!c) return;
    const cls = c.close >= c.open ? 'up' : 'down';
    ['ohlcO','ohlcH','ohlcL','ohlcC'].forEach(id => { document.getElementById(id).className = 'ohlc-val '+cls; });
    document.getElementById('ohlcO').textContent = fmt(c.open);
    document.getElementById('ohlcH').textContent = fmt(c.high);
    document.getElementById('ohlcL').textContent = fmt(c.low);
    document.getElementById('ohlcC').textContent = fmt(c.close);
    document.getElementById('ohlcVol').textContent = c.volume ? 'Vol '+fmtVol(c.volume) : '';
}

function applyChartColors() {
    if (!chart) return;
    chart.applyOptions({
        layout: { background: { type: 'solid', color: colors.bg }, textColor: colors.text },
        grid: { vertLines: { color: colors.grid }, horzLines: { color: colors.grid } },
        crosshair: {
            vertLine: { color: colors.cross },
            horzLine: { color: colors.cross },
        },
    });
    // Re-create series with new colors
    createMainSeries();
    reapplyData();
}

function createMainSeries() {
    if (mainSeries) { try { chart.removeSeries(mainSeries); } catch(e){} }
    if (volumeSeries) { try { chart.removeSeries(volumeSeries); } catch(e){} }
    Object.values(indicatorSeries).forEach(s => { try { chart.removeSeries(s); } catch(e){} });
    indicatorSeries = {};

    if (currentChartType === 'candlestick') {
        mainSeries = chart.addCandlestickSeries({
            upColor: colors.up, downColor: colors.down,
            borderUpColor: colors.up, borderDownColor: colors.down,
            wickUpColor: colors.up, wickDownColor: colors.down,
        });
    } else if (currentChartType === 'bar') {
        mainSeries = chart.addBarSeries({
            upColor: colors.up, downColor: colors.down,
        });
    } else if (currentChartType === 'line') {
        mainSeries = chart.addLineSeries({ color: '#2962ff', lineWidth: 2 });
    } else {
        mainSeries = chart.addAreaSeries({
            topColor: 'rgba(41,98,255,0.3)', bottomColor: 'rgba(41,98,255,0.02)',
            lineColor: '#2962ff', lineWidth: 2,
        });
    }

    if (document.getElementById('chkVolume').checked) {
        volumeSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'volume' });
        chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
    } else {
        volumeSeries = null;
    }
}

function reapplyData() {
    if (!rawCandles.length) return;
    const usesOHLC = currentChartType === 'candlestick' || currentChartType === 'bar';
    if (usesOHLC) mainSeries.setData(rawCandles);
    else mainSeries.setData(rawCandles.map(c => ({ time: c.time, value: c.close })));
    if (volumeSeries) {
        volumeSeries.setData(rawCandles.map(c => ({
            time: c.time, value: c.volume,
            color: c.close >= c.open ? hexToRgba(colors.up,.35) : hexToRgba(colors.down,.35),
        })));
    }
    applyAllIndicators();
    applySessionBreaks();
    // Re-add price lines and update references
    drawnPriceLines = drawnPriceLines.map(entry => {
        try { const priceLine = mainSeries.createPriceLine(entry.opts); return { priceLine, opts: entry.opts }; } catch(e){ return entry; }
    });
}

/* ══════════════ TIMESTAMPS ══════════════ */

function parseTimestamp(ts) {
    if (!ts) return 0;
    if (typeof ts === 'number') return ts + IST_OFFSET;
    let s = String(ts).trim();
    if (!s.includes('Z') && !s.includes('+') && !/\d{2}:\d{2}:\d{2}\.\d+[-]/.test(s)) {
        s = s.replace(' ', 'T') + 'Z';
    }
    const d = new Date(s);
    if (isNaN(d.getTime())) return 0;
    return Math.floor(d.getTime() / 1000) + IST_OFFSET;
}

/* ══════════════ DATA LOADING ══════════════ */

function getDateRange() {
    const now = new Date();
    let from;
    if (currentRange === 'today') from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    else if (currentRange === '2d') from = new Date(now.getTime() - 2*86400000);
    else if (currentRange === '7d') from = new Date(now.getTime() - 7*86400000);
    else from = new Date(now.getTime() - 30*86400000);
    return { from_ts: from.toISOString(), to_ts: now.toISOString() };
}

async function loadChartData() {
    document.getElementById('chartLoading').style.display = 'flex';
    try {
        const range = getDateRange();
        const url = API + '/historical/index-ohlc?symbol=' + encodeURIComponent(currentSymbol) +
            '&interval='+currentInterval+'&from_ts='+encodeURIComponent(range.from_ts) +
            '&to_ts='+encodeURIComponent(range.to_ts)+'&limit=50000';
        const data = await fetchJSON(url);
        if (!data) return;

        const candles = (data.candles||[]).map(c => {
            const t = parseTimestamp(c.bucket || c.ts);
            return { time:t, open:c.open!=null?+c.open:+c.close, high:+c.high, low:+c.low,
                     close:c.close!=null?+c.close:+c.high, volume:+(c.volume||0) };
        }).filter(c => c.time && c.high > 0).sort((a,b) => a.time - b.time);

        rawCandles = [];
        const seen = new Set();
        for (const c of candles) { if (!seen.has(c.time)) { seen.add(c.time); rawCandles.push(c); } }

        if (!rawCandles.length) {
            document.getElementById('dataStatus').textContent = 'No data available';
            mainSeries.setData([]); if (volumeSeries) volumeSeries.setData([]);
            return;
        }

        reapplyData();

        const last = rawCandles[rawCandles.length-1];
        document.getElementById('ohlcSym').textContent = currentSymbol;
        document.getElementById('ohlcInterval').textContent = fmtInterval(currentInterval);
        updateOhlcOverlay(last);
        document.getElementById('toolbarSymbol').textContent = currentSymbol;
        document.getElementById('dataStatus').textContent = rawCandles.length + ' candles \u00b7 IST';

        chart.timeScale().fitContent();
    } catch(e) {
        const msg = e.message || '';
        document.getElementById('dataStatus').textContent =
            (msg.includes('503')||msg.includes('not available')||msg.includes('not initialised'))
            ? 'Historical service not enabled' : 'Error: '+msg;
    } finally {
        document.getElementById('chartLoading').style.display = 'none';
    }
}

function fmtInterval(m) { return m >= 60 ? (m/60)+'H' : m+'m'; }

/* ══════════════ SESSION BREAKS ══════════════ */

function applySessionBreaks() {
    if (mainSeries.setMarkers) mainSeries.setMarkers([]);
    if (!document.getElementById('chkSessionBreaks').checked || rawCandles.length < 2) return;
    const markers = [];
    let prevDay = -1;
    for (let i = 0; i < rawCandles.length; i++) {
        const d = new Date(rawCandles[i].time * 1000);
        const day = d.getUTCDate();
        if (prevDay !== -1 && day !== prevDay) {
            markers.push({ time: rawCandles[i].time, position:'belowBar', color:'#2962ff', shape:'arrowUp', text:'Open' });
            if (i > 0) markers.push({ time: rawCandles[i-1].time, position:'aboveBar', color:'#787b86', shape:'arrowDown', text:'Close' });
        }
        prevDay = day;
    }
    if (markers.length) mainSeries.setMarkers(markers.sort((a,b) => a.time - b.time));
}

/* ══════════════ INDICATORS ══════════════ */

function calcSMA(data, period) {
    const r = [];
    for (let i = period-1; i < data.length; i++) {
        let s = 0; for (let j = i-period+1; j <= i; j++) s += data[j].close;
        r.push({ time: data[i].time, value: s/period });
    }
    return r;
}

function calcEMA(data, period) {
    if (data.length < period) return [];
    const k = 2/(period+1); let s = 0;
    for (let i = 0; i < period; i++) s += data[i].close;
    let ema = s/period;
    const r = [{ time: data[period-1].time, value: ema }];
    for (let i = period; i < data.length; i++) { ema = data[i].close*k + ema*(1-k); r.push({ time: data[i].time, value: ema }); }
    return r;
}

function calcWMA(data, period) {
    const r = [];
    const denom = period*(period+1)/2;
    for (let i = period-1; i < data.length; i++) {
        let s = 0;
        for (let j = 0; j < period; j++) s += data[i-period+1+j].close * (j+1);
        r.push({ time: data[i].time, value: s/denom });
    }
    return r;
}

function calcDEMA(data, period) {
    const ema1 = calcEMA(data, period);
    if (ema1.length < period) return [];
    const ema2 = calcEMA(ema1.map((p,i) => ({ ...data[data.length-ema1.length+i], close: p.value })), period);
    const r = [];
    const offset = ema1.length - ema2.length;
    for (let i = 0; i < ema2.length; i++) {
        r.push({ time: ema2[i].time, value: 2*ema1[i+offset].value - ema2[i].value });
    }
    return r;
}

function calcBB(data, period) {
    const upper=[], lower=[], mid=[];
    for (let i = period-1; i < data.length; i++) {
        let s = 0; for (let j = i-period+1; j <= i; j++) s += data[j].close;
        const avg = s/period;
        let sq = 0; for (let j = i-period+1; j <= i; j++) sq += (data[j].close - avg)**2;
        const std = Math.sqrt(sq/period);
        mid.push({ time: data[i].time, value: avg });
        upper.push({ time: data[i].time, value: avg+2*std });
        lower.push({ time: data[i].time, value: avg-2*std });
    }
    return { upper, mid, lower };
}

function calcVWAP(data) {
    let cumTPV=0, cumVol=0; const r=[]; let lastDay=null;
    for (const c of data) {
        const d = new Date(c.time*1000);
        const day = d.getUTCFullYear()*10000 + (d.getUTCMonth()+1)*100 + d.getUTCDate();
        if (day !== lastDay) { cumTPV=0; cumVol=0; lastDay=day; }
        const tp = (c.high+c.low+c.close)/3, vol = c.volume||1;
        cumTPV += tp*vol; cumVol += vol;
        r.push({ time: c.time, value: cumVol > 0 ? cumTPV/cumVol : tp });
    }
    return r;
}

function calcKeltner(data, period) {
    const emaData = calcEMA(data, period);
    if (!emaData.length) return { upper:[], mid:[], lower:[] };
    const atrPeriod = period;
    const upper=[], lower=[];
    for (let i = 0; i < emaData.length; i++) {
        const idx = data.length - emaData.length + i;
        let atrSum = 0, cnt = 0;
        for (let j = Math.max(1, idx-atrPeriod+1); j <= idx; j++) {
            const tr = Math.max(data[j].high-data[j].low, Math.abs(data[j].high-data[j-1].close), Math.abs(data[j].low-data[j-1].close));
            atrSum += tr; cnt++;
        }
        const atr = cnt > 0 ? atrSum/cnt : 0;
        upper.push({ time: emaData[i].time, value: emaData[i].value + 2*atr });
        lower.push({ time: emaData[i].time, value: emaData[i].value - 2*atr });
    }
    return { upper, mid: emaData, lower };
}

function calcDonchian(data, period) {
    const upper=[], lower=[], mid=[];
    for (let i = period-1; i < data.length; i++) {
        let hi=-Infinity, lo=Infinity;
        for (let j = i-period+1; j <= i; j++) { hi = Math.max(hi, data[j].high); lo = Math.min(lo, data[j].low); }
        upper.push({ time: data[i].time, value: hi });
        lower.push({ time: data[i].time, value: lo });
        mid.push({ time: data[i].time, value: (hi+lo)/2 });
    }
    return { upper, mid, lower };
}

function calcParabolicSAR(data) {
    if (data.length < 2) return [];
    const r = [];
    let af = 0.02, maxAf = 0.2, step = 0.02;
    let isUp = data[1].close > data[0].close;
    let sar = isUp ? data[0].low : data[0].high;
    let ep = isUp ? data[1].high : data[1].low;
    r.push({ time: data[0].time, value: sar });
    for (let i = 1; i < data.length; i++) {
        sar = sar + af * (ep - sar);
        if (isUp) {
            if (i >= 2) sar = Math.min(sar, data[i-1].low, data[i-2].low);
            if (data[i].low < sar) { isUp = false; sar = ep; ep = data[i].low; af = step; }
            else { if (data[i].high > ep) { ep = data[i].high; af = Math.min(af + step, maxAf); } }
        } else {
            if (i >= 2) sar = Math.max(sar, data[i-1].high, data[i-2].high);
            if (data[i].high > sar) { isUp = true; sar = ep; ep = data[i].high; af = step; }
            else { if (data[i].low < ep) { ep = data[i].low; af = Math.min(af + step, maxAf); } }
        }
        r.push({ time: data[i].time, value: sar });
    }
    return r;
}

function calcPivots(data) {
    // Daily pivots based on previous day's HLC
    const dayMap = {};
    for (const c of data) {
        const d = new Date(c.time*1000);
        const key = d.getUTCFullYear()*10000 + (d.getUTCMonth()+1)*100 + d.getUTCDate();
        if (!dayMap[key]) dayMap[key] = { high:-Infinity, low:Infinity, close:0, candles:[] };
        dayMap[key].high = Math.max(dayMap[key].high, c.high);
        dayMap[key].low = Math.min(dayMap[key].low, c.low);
        dayMap[key].close = c.close;
        dayMap[key].candles.push(c);
    }
    const days = Object.keys(dayMap).sort();
    const pivot=[], s1=[], r1=[];
    for (let i = 1; i < days.length; i++) {
        const prev = dayMap[days[i-1]];
        const pp = (prev.high + prev.low + prev.close) / 3;
        const sup1 = 2*pp - prev.high;
        const res1 = 2*pp - prev.low;
        for (const c of dayMap[days[i]].candles) {
            pivot.push({ time: c.time, value: pp });
            s1.push({ time: c.time, value: sup1 });
            r1.push({ time: c.time, value: res1 });
        }
    }
    return { pivot, s1, r1 };
}

function calcSupertrend(data, period, mult) {
    if (data.length < period) return { up:[], dn:[] };
    // ATR
    const atr = [];
    for (let i = 0; i < data.length; i++) {
        if (i === 0) { atr.push(data[0].high - data[0].low); continue; }
        const tr = Math.max(data[i].high-data[i].low, Math.abs(data[i].high-data[i-1].close), Math.abs(data[i].low-data[i-1].close));
        atr.push(tr);
    }
    // Smoothed ATR (RMA)
    const satr = [];
    let sum = 0;
    for (let i = 0; i < period; i++) sum += atr[i];
    satr.push(sum / period);
    for (let i = period; i < data.length; i++) {
        satr.push((satr[satr.length - 1] * (period - 1) + atr[i]) / period);
    }
    const offset = period-1;
    const upBand=[], dnBand=[], trend=[];
    for (let i = 0; i < satr.length; i++) {
        const di = i + offset;
        const hl2 = (data[di].high + data[di].low) / 2;
        let ub = hl2 + mult * satr[i];
        let lb = hl2 - mult * satr[i];
        if (i > 0) {
            ub = data[di].close > upBand[i-1] ? ub : Math.min(ub, upBand[i-1]);
            lb = data[di].close < dnBand[i-1] ? lb : Math.max(lb, dnBand[i-1]);
        }
        upBand.push(ub); dnBand.push(lb);
        if (i === 0) {
            trend.push(data[di].close > ub ? -1 : 1);
        } else {
            const pt = trend[i-1];
            if (pt === 1 && data[di].close > upBand[i]) trend.push(-1);
            else if (pt === -1 && data[di].close < dnBand[i]) trend.push(1);
            else trend.push(pt);
        }
    }
    // trend=1 → bearish (show upper band), trend=-1 → bullish (show lower band)
    const up=[], dn=[];
    for (let i = 0; i < trend.length; i++) {
        const di = i + offset;
        if (trend[i] === 1) { // bearish
            dn.push({ time: data[di].time, value: upBand[i] });
        } else { // bullish
            up.push({ time: data[di].time, value: dnBand[i] });
        }
    }
    return { up, dn };
}

function applyAllIndicators() {
    Object.values(indicatorSeries).forEach(s => { try { chart.removeSeries(s); } catch(e){} });
    indicatorSeries = {};
    if (!rawCandles.length) return;

    for (const ind of INDICATORS) {
        if (!activeIndicators.has(ind.id)) continue;
        const lopts = { color: ind.color, lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false };

        if (ind.type === 'sma') {
            const pts = calcSMA(rawCandles, ind.period);
            if (pts.length) { const s = chart.addLineSeries(lopts); s.setData(pts); indicatorSeries[ind.id] = s; }
        } else if (ind.type === 'ema') {
            const pts = calcEMA(rawCandles, ind.period);
            if (pts.length) { const s = chart.addLineSeries(lopts); s.setData(pts); indicatorSeries[ind.id] = s; }
        } else if (ind.type === 'wma') {
            const pts = calcWMA(rawCandles, ind.period);
            if (pts.length) { const s = chart.addLineSeries(lopts); s.setData(pts); indicatorSeries[ind.id] = s; }
        } else if (ind.type === 'dema') {
            const pts = calcDEMA(rawCandles, ind.period);
            if (pts.length) { const s = chart.addLineSeries(lopts); s.setData(pts); indicatorSeries[ind.id] = s; }
        } else if (ind.type === 'bb' || ind.type === 'kc' || ind.type === 'dc') {
            let band;
            if (ind.type === 'bb') band = calcBB(rawCandles, ind.period);
            else if (ind.type === 'kc') band = calcKeltner(rawCandles, ind.period);
            else band = calcDonchian(rawCandles, ind.period);
            if (band.upper.length) {
                const dash = { ...lopts, lineWidth:1, lineStyle: LightweightCharts.LineStyle.Dashed };
                const sU = chart.addLineSeries(dash); sU.setData(band.upper); indicatorSeries[ind.id+'_u'] = sU;
                const sM = chart.addLineSeries({ ...lopts, lineWidth:1 }); sM.setData(band.mid); indicatorSeries[ind.id+'_m'] = sM;
                const sL = chart.addLineSeries(dash); sL.setData(band.lower); indicatorSeries[ind.id+'_l'] = sL;
            }
        } else if (ind.type === 'vwap') {
            const pts = calcVWAP(rawCandles);
            if (pts.length) { const s = chart.addLineSeries({ ...lopts, lineWidth:2 }); s.setData(pts); indicatorSeries[ind.id] = s; }
        } else if (ind.type === 'psar') {
            const pts = calcParabolicSAR(rawCandles);
            if (pts.length) {
                // Show as dots — use line series with very small lineWidth and markers
                const s = chart.addLineSeries({ ...lopts, lineWidth:0, pointMarkersVisible:true, pointMarkersRadius:2 });
                s.setData(pts);
                indicatorSeries[ind.id] = s;
            }
        } else if (ind.type === 'pivots') {
            const p = calcPivots(rawCandles);
            if (p.pivot.length) {
                const sP = chart.addLineSeries({ ...lopts, lineStyle: LightweightCharts.LineStyle.Dotted }); sP.setData(p.pivot); indicatorSeries[ind.id+'_p'] = sP;
                const sR = chart.addLineSeries({ ...lopts, color:'#ef5350', lineStyle: LightweightCharts.LineStyle.Dotted }); sR.setData(p.r1); indicatorSeries[ind.id+'_r'] = sR;
                const sS = chart.addLineSeries({ ...lopts, color:'#26a69a', lineStyle: LightweightCharts.LineStyle.Dotted }); sS.setData(p.s1); indicatorSeries[ind.id+'_s'] = sS;
            }
        } else if (ind.type === 'supertrend') {
            const st = calcSupertrend(rawCandles, ind.period, ind.mult);
            if (st.up.length) { const s = chart.addLineSeries({ ...lopts, color:'#22c55e', lineWidth:2 }); s.setData(st.up); indicatorSeries[ind.id+'_up'] = s; }
            if (st.dn.length) { const s = chart.addLineSeries({ ...lopts, color:'#ef5350', lineWidth:2 }); s.setData(st.dn); indicatorSeries[ind.id+'_dn'] = s; }
        }
    }
}

/* ══════════════ DRAWING TOOLS ══════════════ */

function handleChartClick(time, price) {
    if (currentDrawTool === 'hline') {
        const opts = { price: price, color: '#2962ff', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
                       axisLabelVisible: true, title: fmt(price) };
        const priceLine = mainSeries.createPriceLine(opts);
        drawnPriceLines.push({ priceLine, opts });
        setDrawTool('pointer');
    }
}

function setDrawTool(tool) {
    if (tool === 'clearAll') {
        drawnPriceLines.forEach(entry => {
            try { mainSeries.removePriceLine(entry.priceLine); } catch(e){}
        });
        drawnPriceLines = [];
        return;
    }
    currentDrawTool = tool;
    document.querySelectorAll('.tv-draw-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
    // Change cursor
    const container = document.getElementById('chartContainer');
    container.style.cursor = tool === 'pointer' ? '' : 'crosshair';
}

/* ══════════════ SYMBOL LIST ══════════════ */

async function loadSymbols() {
    try {
        const data = await fetchJSON(API + '/settings/market-data/available');
        if (data && data.indices && data.indices.length) { allSymbols = data.indices; return; }
    } catch(e) {}
    try {
        const data = await fetchJSON(API + '/home/status');
        if (data && data.broker && Array.isArray(data.broker.positions)) {
            const posSyms = new Set();
            for (const p of data.broker.positions) { const sym = p.tsym||p.symbol; if (sym && parseInt(p.netqty||0)!==0) posSyms.add(sym); }
            if (posSyms.size) { allSymbols = Array.from(posSyms).map(sym => ({ symbol:sym, name:sym, exchange:'', subscribed:true, configured:true }));
                if (allSymbols.length) currentSymbol = allSymbols[0].symbol; return; }
        }
    } catch(e) {}
    allSymbols = ['NIFTY','BANKNIFTY','SENSEX','FINNIFTY','INDIAVIX','GOLDPETAL','CRUDEOILM','SILVERMIC','NATGASMINI']
        .map(sym => ({ symbol:sym, name:sym, exchange:'', subscribed:false, configured:false }));
}

function renderSymbolList(filter) {
    const list = document.getElementById('symList');
    let items = allSymbols;
    if (filter) { const q = filter.toLowerCase(); items = items.filter(i => i.symbol.toLowerCase().includes(q) || (i.name||'').toLowerCase().includes(q)); }
    if (!items.length) { list.innerHTML = '<div style="text-align:center;padding:20px;color:#787b86;font-size:13px">No symbols found</div>'; return; }
    list.innerHTML = items.map(idx => {
        const active = idx.symbol === currentSymbol ? ' active' : '';
        const dot = idx.subscribed||idx.configured ? 'tv-sym-dot live' : 'tv-sym-dot off';
        return '<div class="tv-sym-item'+active+'" data-symbol="'+esc(idx.symbol)+'">' +
            '<div class="'+dot+'"></div><span class="sym-name">'+esc(idx.symbol)+'</span>' +
            '<span class="sym-desc">'+esc(idx.name||'')+'</span>' +
            (idx.exchange ? '<span class="sym-exch">'+esc(idx.exchange)+'</span>' : '') + '</div>';
    }).join('');
}

/* ══════════════ INDICATOR PANEL ══════════════ */

function renderIndicators() {
    document.getElementById('menuIndicators').innerHTML = INDICATORS.map(ind => {
        const active = activeIndicators.has(ind.id) ? ' active' : '';
        return '<div class="tv-dd-item'+active+'" data-ind="'+ind.id+'">' +
            '<div class="dd-check">'+(activeIndicators.has(ind.id)?'\u2713':'')+'</div>' +
            '<div class="dd-dot" style="background:'+ind.color+'"></div>' +
            '<span>'+esc(ind.label)+'</span></div>';
    }).join('');
}

/* ══════════════ DROPDOWN LOGIC ══════════════ */

function closeAllDropdowns() {
    document.querySelectorAll('.tv-dd.open').forEach(d => d.classList.remove('open'));
}

function toggleDropdown(id) {
    const dd = document.getElementById(id);
    const wasOpen = dd.classList.contains('open');
    closeAllDropdowns();
    if (!wasOpen) dd.classList.add('open');
}

/* ══════════════ EVENT HANDLERS ══════════════ */

// Close dropdowns on outside click
document.addEventListener('click', e => {
    if (!e.target.closest('.tv-dd')) closeAllDropdowns();
});

// Symbol
document.getElementById('btnSymbol').addEventListener('click', () => {
    document.getElementById('symModal').classList.add('open');
    renderSymbolList();
    setTimeout(() => document.getElementById('symSearchInput').focus(), 50);
});
document.getElementById('symModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('symSearchInput').addEventListener('input', function() { renderSymbolList(this.value); });
document.getElementById('symList').addEventListener('click', e => {
    const item = e.target.closest('.tv-sym-item');
    if (!item) return;
    const sym = item.dataset.symbol;
    if (!sym) return;
    currentSymbol = sym;
    document.getElementById('symModal').classList.remove('open');
    document.getElementById('symSearchInput').value = '';
    loadChartData();
});

// Interval dropdown
document.getElementById('btnInterval').addEventListener('click', e => { e.stopPropagation(); toggleDropdown('ddInterval'); });
document.getElementById('menuInterval').addEventListener('click', e => {
    const item = e.target.closest('.tv-dd-item');
    if (!item) return;
    currentInterval = parseInt(item.dataset.val, 10);
    document.querySelectorAll('#menuInterval .tv-dd-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    document.getElementById('lblInterval').textContent = fmtInterval(currentInterval);
    closeAllDropdowns();
    loadChartData();
});

// Chart type dropdown
document.getElementById('btnChartType').addEventListener('click', e => { e.stopPropagation(); toggleDropdown('ddChartType'); });
document.getElementById('menuChartType').addEventListener('click', e => {
    const item = e.target.closest('.tv-dd-item');
    if (!item) return;
    currentChartType = item.dataset.type;
    document.querySelectorAll('#menuChartType .tv-dd-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    closeAllDropdowns();
    createMainSeries();
    reapplyData();
    chart.timeScale().fitContent();
});

// Indicators dropdown
document.getElementById('btnIndicators').addEventListener('click', e => { e.stopPropagation(); toggleDropdown('ddIndicators'); });
document.getElementById('menuIndicators').addEventListener('click', e => {
    e.stopPropagation();
    const item = e.target.closest('.tv-dd-item');
    if (!item) return;
    const id = item.dataset.ind;
    if (activeIndicators.has(id)) activeIndicators.delete(id); else activeIndicators.add(id);
    renderIndicators();
    applyAllIndicators();
});

// Log scale
document.getElementById('btnLogScale').addEventListener('click', function() {
    const isLog = !this.classList.contains('active');
    this.classList.toggle('active', isLog);
    chart.applyOptions({ rightPriceScale: { mode: isLog ? 1 : 0 } });
    document.getElementById('selScaleMode').value = isLog ? '1' : '0';
});

// Zoom controls
document.getElementById('btnZoomIn').addEventListener('click', () => {
    const ts = chart.timeScale(), range = ts.getVisibleLogicalRange();
    if (range) { const mid = (range.from+range.to)/2, sp = (range.to-range.from)/4; ts.setVisibleLogicalRange({ from:mid-sp, to:mid+sp }); }
});
document.getElementById('btnZoomOut').addEventListener('click', () => {
    const ts = chart.timeScale(), range = ts.getVisibleLogicalRange();
    if (range) { const mid = (range.from+range.to)/2, sp = (range.to-range.from); ts.setVisibleLogicalRange({ from:mid-sp, to:mid+sp }); }
});
document.getElementById('btnFitAll').addEventListener('click', () => { chart.timeScale().fitContent(); });

// Range bar
document.querySelector('.tv-range-bar').addEventListener('click', e => {
    const btn = e.target.closest('.tv-range-btn');
    if (!btn) return;
    document.querySelectorAll('.tv-range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    loadChartData();
});

// Drawing tools
document.querySelector('.tv-draw-bar').addEventListener('click', e => {
    const btn = e.target.closest('.tv-draw-btn');
    if (!btn) return;
    setDrawTool(btn.dataset.tool);
});

// Settings modal (from gear icon)
document.getElementById('btnGear').addEventListener('click', () => {
    syncColorInputs();
    document.getElementById('settingsModal').classList.add('open');
});
document.getElementById('settingsModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('btnCloseSettings').addEventListener('click', () => { document.getElementById('settingsModal').classList.remove('open'); });

// Apply settings
document.getElementById('btnApplySettings').addEventListener('click', () => {
    colors.bg = document.getElementById('clrBg').value;
    colors.up = document.getElementById('clrUp').value;
    colors.down = document.getElementById('clrDown').value;
    colors.grid = document.getElementById('clrGrid').value;
    colors.cross = document.getElementById('clrCross').value;
    colors.text = document.getElementById('clrText').value;
    saveColorSettings();
    const mode = parseInt(document.getElementById('selScaleMode').value, 10);
    document.getElementById('btnLogScale').classList.toggle('active', mode === 1);
    chart.applyOptions({ rightPriceScale: { mode } });
    applyChartColors();
    document.getElementById('settingsModal').classList.remove('open');
});

// Reset defaults
document.getElementById('btnResetColors').addEventListener('click', () => {
    colors = { ...defaultColors };
    syncColorInputs();
    saveColorSettings();
    applyChartColors();
});

// Settings toggles (auto apply)
document.getElementById('chkSessionBreaks').addEventListener('change', () => applySessionBreaks());
document.getElementById('chkVolume').addEventListener('change', () => { createMainSeries(); reapplyData(); });
document.getElementById('selCrosshair').addEventListener('change', function() {
    chart.applyOptions({ crosshair: { mode: this.value === 'magnet' ? LightweightCharts.CrosshairMode.Magnet : LightweightCharts.CrosshairMode.Normal } });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape') {
        document.getElementById('symModal').classList.remove('open');
        document.getElementById('settingsModal').classList.remove('open');
        closeAllDropdowns();
        setDrawTool('pointer');
    }
    if (e.key === 'r' || e.key === 'R') chart.timeScale().fitContent();
    if (e.key === 'l' || e.key === 'L') document.getElementById('btnLogScale').click();
});

// URL hash symbol
if (location.hash && location.hash.length > 1) {
    currentSymbol = decodeURIComponent(location.hash.slice(1)).toUpperCase();
}

/* ── Auto-refresh ── */
function startAutoRefresh() {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => {
        if (!document.getElementById('chkAutoRefresh').checked) return;
        const h = new Date().getUTCHours();
        if (h >= 3 && h <= 10) loadChartData();
    }, 10000);
}

/* ══════════════ INIT ══════════════ */

async function init() {
    loadColorSettings();
    syncColorInputs();
    initChart();
    renderIndicators();
    await loadSymbols();

    if (allSymbols.some(s => s.symbol === currentSymbol)) {
        document.getElementById('toolbarSymbol').textContent = currentSymbol;
    } else if (allSymbols.length) {
        currentSymbol = allSymbols[0].symbol;
    }

    await loadChartData();
    startAutoRefresh();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
