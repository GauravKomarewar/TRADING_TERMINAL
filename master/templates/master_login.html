<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Manager — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🛡️</div>
      <div class="text-white font-bold text-xl">Master Account Manager</div>
      <div class="text-gray-400 text-sm mt-1">Shoonya Trading Platform</div>
    </div>

    {% if error %}
    <div class="bg-red-900 border border-red-700 text-red-200 rounded-lg px-4 py-3 mb-4 text-sm">
      ❌ {{ error }}
    </div>
    {% endif %}

    <form action="/auth/login" method="post" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1" for="password">Admin Password</label>
        <input
          id="password" name="password" type="password" required autofocus
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter admin password"
        >
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition">
        Login →
      </button>
    </form>
  </div>
</body>
</html>
