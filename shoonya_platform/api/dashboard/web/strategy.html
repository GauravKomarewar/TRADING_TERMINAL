<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Manager | Shoonya Platform</title>
<link rel="stylesheet" href="/dashboard/web/styles/common.css">
<link rel="stylesheet" href="/dashboard/web/shared/layout.css">
<script src="/dashboard/web/shared/pages-config.js" defer></script>
<script src="/dashboard/web/shared/layout.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #66e4ff; --primary-dark: #23b6ff;
  --success: #4ade80; --warning: #fbcb5c; --danger: #fb7185;
  --panel: rgba(13,18,41,0.8); --panel-2: rgba(6,10,26,0.95);
  --text: #f8fbff; --muted: rgba(248,251,255,0.65);
  --border: rgba(255,255,255,0.08);
  --font-mono: 'IBM Plex Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  background:radial-gradient(circle at top,#0f1a3c 0%,#050815 55%,#020308 100%); 
  color:var(--text); 
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto; 
  font-size:13px; 
  overflow-x:hidden; 
}
main { padding:20px; max-width:1800px; margin:0 auto; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.header h1 { font-size:24px; font-weight:700; }
.tabs { display:flex; gap:12px; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:12px; }
.tab-btn { 
  padding:8px 16px; 
  background:none; 
  border:none; 
  color:var(--muted); 
  cursor:pointer; 
  transition:all 0.3s; 
  border-bottom:2px solid transparent; 
  font-weight:600; 
}
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab-content { display:none; animation:fadeIn 0.3s; }
.tab-content.active { display:block; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.widget { 
  background:var(--panel); 
  border:1px solid var(--border); 
  border-radius:12px; 
  padding:16px; 
  margin-bottom:16px; 
  backdrop-filter:blur(20px); 
}
.widget-title { 
  font-size:14px; 
  font-weight:700; 
  margin-bottom:12px; 
  display:flex; 
  align-items:center; 
  gap:8px; 
  justify-content:space-between;
}
.live-indicator { width:8px; height:8px; background:var(--muted); border-radius:50%; }
.live-indicator.online { background:var(--success); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.btn { 
  padding:8px 16px; 
  border:none; 
  border-radius:6px; 
  font-weight:600; 
  cursor:pointer; 
  transition:all 0.2s; 
  font-size:12px; 
}
.btn-primary { background:linear-gradient(120deg,var(--primary),var(--primary-dark)); color:#04060f; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 24px rgba(35,182,255,0.4); }
.btn-success { background:var(--success); color:#000; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-warning { background:var(--warning); color:#000; }
.btn-secondary { background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--border); }
.btn-sm { padding:4px 10px; font-size:11px; }
/* Disabled button styling */
.btn-mode:disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }
/* Action buttons wrap on mobile */
.strat-card-actions { 
  display:flex; 
  gap:6px; 
  align-items:center; 
  flex-wrap:wrap; 
}
.table { width:100%; border-collapse:collapse; font-size:12px; }
.table thead { background:rgba(0,0,0,0.3); border-bottom:1px solid var(--border); }
.table th { padding:10px; text-align:left; font-weight:700; color:var(--primary); }
.table td { padding:10px; border-bottom:1px solid rgba(255,255,255,0.03); }
.table tbody tr:hover { background:rgba(255,255,255,0.03); }
.badge { display:inline-block; padding:3px 8px; border-radius:3px; font-size:11px; font-weight:600; }
.badge-idle { background:rgba(255,255,255,0.1); color:var(--muted); }
.badge-running { background:rgba(74,222,128,0.2); color:var(--success); border:1px solid var(--success); }
.badge-stopped { background:rgba(251,113,133,0.2); color:var(--danger); border:1px solid var(--danger); }
.badge-paused { background:rgba(251,203,92,0.2); color:var(--warning); border:1px solid var(--warning); }
.badge-enabled { background:rgba(74,222,128,0.2); color:var(--success); }
.badge-disabled { background:rgba(255,255,255,0.1); color:var(--muted); }
.strat-card { 
  border:1px solid var(--border); 
  border-radius:8px; 
  padding:14px; 
  margin-bottom:10px; 
  background:rgba(0,0,0,0.15); 
  transition:all 0.2s; 
}
.strat-card:hover { border-color:rgba(102,228,255,0.3); }
.strat-card-header { 
  display:flex; 
  justify-content:space-between; 
  align-items:center; 
  margin-bottom:8px; 
  flex-wrap:wrap;
  gap:8px;
}
.strat-card-name { 
  font-size:14px; 
  font-weight:700; 
  color:var(--primary); 
  font-family:var(--font-mono); 
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.strat-card-meta { 
  display:flex; 
  gap:16px; 
  font-size:11px; 
  color:var(--muted); 
  margin-top:8px;
  flex-wrap:wrap;
}
.search-box { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.search-box input { 
  flex:1; 
  min-width:200px;
  padding:8px; 
  background:rgba(0,0,0,0.2); 
  border:1px solid var(--border); 
  border-radius:4px; 
  color:var(--text); 
}
.toast { 
  position:fixed; 
  top:20px; 
  right:20px; 
  padding:12px 20px; 
  border-radius:8px; 
  font-size:12px; 
  z-index:9999; 
  animation:slideIn 0.3s; 
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.toast-success { background:var(--success); color:#000; }
.toast-error { background:var(--danger); color:#fff; }
.toast-info { background:var(--primary); color:#000; }
@keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
.modal { 
  display:none; 
  position:fixed; 
  top:0; 
  left:0; 
  width:100%; 
  height:100%; 
  background:rgba(0,0,0,0.8); 
  z-index:1000; 
  align-items:center; 
  justify-content:center;
}
.modal.show { display:flex; }
.modal-content { 
  background:var(--panel-2); 
  border:1px solid var(--border); 
  border-radius:12px; 
  padding:24px; 
  max-width:500px; 
  width:90%;
  max-height:80vh;
  overflow-y:auto;
}
.modal-header { 
  font-size:18px; 
  font-weight:700; 
  margin-bottom:20px; 
  padding-bottom:12px; 
  border-bottom:1px solid var(--border);
}
.modal-header-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.icon-close {
  width:30px;
  height:30px;
  border:1px solid var(--border);
  border-radius:6px;
  background:rgba(255,255,255,0.06);
  color:var(--text);
  cursor:pointer;
  font-size:18px;
  line-height:1;
}
.icon-close:hover {
  background:rgba(255,255,255,0.12);
}
.modal-footer { 
  display:flex; 
  gap:8px; 
  justify-content:flex-end; 
  margin-top:20px; 
  padding-top:16px; 
  border-top:1px solid var(--border);
}
.form-group { margin-bottom:14px; }
.form-group label { 
  display:block; 
  font-size:11px; 
  font-weight:600; 
  margin-bottom:4px; 
  color:var(--muted); 
}
.form-control { 
  width:100%; 
  padding:8px 10px; 
  background:rgba(0,0,0,0.3); 
  border:1px solid var(--border); 
  border-radius:4px; 
  color:var(--text); 
  font-family:var(--font-mono); 
  font-size:12px; 
}
.form-control:focus { 
  outline:none; 
  border-color:var(--primary); 
  box-shadow:0 0 12px rgba(102,228,255,0.1); 
}
select.form-control { appearance:auto; }
textarea.form-control { 
  min-height:80px; 
  font-family:inherit; 
  resize:vertical;
}
.toggle-switch { 
  position:relative; 
  display:inline-block; 
  width:44px; 
  height:22px; 
}
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-slider { 
  position:absolute; 
  cursor:pointer; 
  top:0; 
  left:0; 
  right:0; 
  bottom:0; 
  background:rgba(255,255,255,0.1); 
  transition:0.3s; 
  border-radius:22px;
}
.toggle-slider:before { 
  position:absolute; 
  content:""; 
  height:16px; 
  width:16px; 
  left:3px; 
  bottom:3px; 
  background:var(--muted); 
  transition:0.3s; 
  border-radius:50%;
}
input:checked + .toggle-slider { background:var(--success); }
input:checked + .toggle-slider:before { 
  transform:translateX(22px); 
  background:#fff; 
}
.empty-state { 
  text-align:center; 
  padding:60px 20px; 
  color:var(--muted);
}
.empty-state-icon { 
  font-size:48px; 
  margin-bottom:16px; 
  opacity:0.5;
}
.empty-state-text { 
  font-size:14px; 
  margin-bottom:20px;
}
.filters { 
  display:flex; 
  gap:8px; 
  margin-bottom:12px; 
  flex-wrap:wrap;
}
.filter-btn { 
  padding:6px 12px; 
  background:rgba(0,0,0,0.2); 
  border:1px solid var(--border); 
  border-radius:4px; 
  color:var(--muted); 
  cursor:pointer; 
  font-size:11px; 
  transition:all 0.2s;
}
.filter-btn.active { 
  background:var(--primary); 
  color:#000; 
  border-color:var(--primary);
}
.status-dot { 
  width:6px; 
  height:6px; 
  border-radius:50%; 
  display:inline-block; 
  margin-right:4px;
}
.status-dot.idle { background:var(--muted); }
.status-dot.running { background:var(--success); animation:pulse 2s infinite; }
.status-dot.stopped { background:var(--danger); }
.status-dot.paused { background:var(--warning); }
.monitor-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  margin-bottom:12px;
}
.monitor-card {
  background:rgba(0,0,0,0.22);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
}
.monitor-label { font-size:11px; color:var(--muted); }
.monitor-value { font-size:18px; font-weight:700; margin-top:4px; }
.monitor-section { margin-top:14px; }
.monitor-subtitle { font-size:12px; color:var(--primary); margin-bottom:8px; font-weight:700; }
.table-wrap { width:100%; overflow-x:auto; overflow-y:hidden; margin:0; padding:0; }
.table-wrap .table { min-width:1450px; }
.table td, .table th { white-space:nowrap; }
.delta-pos { color: var(--success); font-weight: 700; }
.delta-neg { color: var(--danger); font-weight: 700; }
.delta-neutral { color: var(--muted); font-weight: 700; }
.combined-delta-pill {
  display:inline-block; padding:2px 8px; border-radius:10px; border:1px solid var(--border);
  background:rgba(255,255,255,0.04); font-weight:700;
}
.monitor-tables-stack { margin-top: 8px; }

.badge-mode { font-family: var(--font-mono); font-weight: 700; font-size: 10px; }
.badge-live { 
  background: linear-gradient(120deg, #fb7185, #f43f5e); 
  color: #fff; 
  border: 1px solid #fb7185; 
  box-shadow: 0 0 12px rgba(251, 113, 133, 0.3);
}
.badge-mock { 
  background: rgba(251, 203, 92, 0.2); 
  color: var(--warning); 
  border: 1px solid var(--warning); 
}
.mode-changing { opacity: 0.5; pointer-events: none; }
.btn-mode { font-size: 11px; padding: 5px 10px; }
</style>
</head>
<body>
<main>
  <div class="header">
    <h1>📊 Strategy Manager</h1>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;">
      <span class="live-indicator" id="runner-indicator"></span>
      <span id="runner-status">Loading...</span>
      <button class="btn btn-secondary btn-sm" onclick="refreshStatus()" style="margin-left:8px;">Refresh</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('list', this)">📋 All Strategies</button>
    <button class="tab-btn" onclick="switchTab('monitor', this)">Live Monitor</button>
  </div>

  <!-- ====== TAB 1: ALL STRATEGIES ====== -->
  <div id="list-tab" class="tab-content active">
    <div class="widget">
      <div class="widget-title">
        <span>Saved Strategies</span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="openBuilderPage()">+ New Strategy</button>
          <button class="btn btn-secondary btn-sm" onclick="importStrategy()">Import</button>
        </div>
      </div>
      
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search strategies..." oninput="filterStrategies()">
        <select id="type-filter" class="form-control" style="width:auto;" onchange="filterStrategies()">
          <option value="">All Types</option>
          <option value="dnss">DNSS</option>
          <option value="iron_condor">Iron Condor</option>
          <option value="strangle">Strangle</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadStrategies()">⟳ Reload</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this, 'all')">All</button>
        <button class="filter-btn" data-filter="enabled" onclick="setFilter(this, 'enabled')">Enabled</button>
        <button class="filter-btn" data-filter="disabled" onclick="setFilter(this, 'disabled')">Disabled</button>
        <button class="filter-btn" data-filter="running" onclick="setFilter(this, 'running')">Running</button>
        <button class="filter-btn" data-filter="idle" onclick="setFilter(this, 'idle')">Idle</button>
      </div>

      <div id="strategies-list"></div>
    </div>
  </div>

  <!-- ====== TAB 2: LIVE MONITOR ====== -->
  <div id="monitor-tab" class="tab-content">
    <div class="widget">
      <div class="widget-title">
        <span>Live Position Monitor</span>
        <button class="btn btn-secondary btn-sm" onclick="loadLiveMonitor()">⟳ Refresh</button>
      </div>
      <div id="monitor-summary" class="monitor-grid"></div>

      <div class="monitor-section">
        <div class="monitor-subtitle">Strategy-Linked Positions</div>
        <div id="monitor-strategy-groups"></div>
      </div>

      <div class="monitor-section">
        <div class="monitor-subtitle">Orphan Positions (not strategy-generated)</div>
        <div id="monitor-orphans"></div>
      </div>
    </div>
  </div>
</main>

<!-- ====== MODALS ====== -->
<!-- Enable/Disable Confirm Modal -->
<div id="toggle-modal" class="modal">
  <div class="modal-content" style="max-width:400px;">
    <div class="modal-header" id="toggle-modal-title">Confirm Action</div>
    <p id="toggle-modal-message" style="margin-bottom:20px;color:var(--muted);font-size:13px;"></p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('toggle-modal')">Cancel</button>
      <button class="btn btn-primary" id="toggle-modal-confirm" onclick="confirmToggle()">Confirm</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-modal" class="modal">
  <div class="modal-content" style="max-width:400px;">
    <div class="modal-header">Delete Strategy</div>
    <p style="margin-bottom:20px;color:var(--muted);font-size:13px;">
      Are you sure you want to delete strategy <strong id="delete-strategy-name" style="color:var(--danger);"></strong>?
      This action cannot be undone.
    </p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- View Details Modal -->
<div id="details-modal" class="modal">
  <div class="modal-content" style="max-width:600px;">
    <div class="modal-header modal-header-row"><span>Strategy Details</span><button class="icon-close" type="button" onclick="closeModal('details-modal')" aria-label="Close details">&times;</button></div>
    <div id="details-content" style="font-size:12px;font-family:var(--font-mono);"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('details-modal')">Close</button>
      <button class="btn btn-primary" onclick="editCurrentStrategy()">Edit</button>
    </div>
  </div>
</div>

<script>
// ====== GLOBALS ======
const API_BASE = '/dashboard';
let allStrategies = [];
let currentFilter = 'all';
let currentToggleStrategy = null;
let currentDeleteStrategy = null;
let currentDetailsStrategy = null;
const monitorRenderCache = {
  summary: '',
  groups: '',
  orphans: ''
};

// ====== UTILS ======
const $ = id => document.getElementById(id);
const toast = (msg, type='success') => {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
};

const api = async (method, path, body=null) => {
  const opts = { 
    method, 
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include' 
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
};

const escHtml = str => String(str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function setHtmlIfChanged(id, key, html) {
  if (monitorRenderCache[key] !== html) {
    monitorRenderCache[key] = html;
    $(id).innerHTML = html;
  }
}

// ====== TAB SWITCHING ======
function switchTab(name, btnEl=null) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  const tabMap = {
    'list': 'list-tab',
    'monitor': 'monitor-tab'
  };
  
  const activeBtn = btnEl || document.querySelector(`.tab-btn[onclick*="switchTab('${name}'"]`);
  if (activeBtn) activeBtn.classList.add('active');
  $(tabMap[name]).classList.add('active');
  
  if (name === 'list') loadStrategies();
  if (name === 'monitor') loadLiveMonitor();
}

// ====== LOAD STRATEGIES ======
async function loadStrategies() {
  try {
    const r = await api('GET', '/strategy/configs');
    allStrategies = r.configs || r.strategies || [];
    renderStrategies();
  } catch(e) {
    toast('Failed to load strategies: ' + e.message, 'error');
  }
}

function renderStrategies() {
  const list = $('strategies-list');
  
  let filtered = allStrategies.filter(s => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'enabled') return s.enabled !== false;
    if (currentFilter === 'disabled') return s.enabled === false;
    if (currentFilter === 'running') return s.status === 'RUNNING';
    if (currentFilter === 'idle') return s.status === 'IDLE' || !s.status;
    return true;
  });

  const search = $('search-input')?.value.toLowerCase();
  if (search) {
    filtered = filtered.filter(s => 
      s.name.toLowerCase().includes(search) || 
      (s.description||'').toLowerCase().includes(search)
    );
  }

  const typeFilter = $('type-filter')?.value;
  if (typeFilter) {
    filtered = filtered.filter(s => s.strategy_type === typeFilter);
  }

  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div class="empty-state-text">No strategies found</div>
        <button class="btn btn-primary btn-sm" onclick="openBuilderPage()">Create First Strategy</button>
      </div>
    `;
    return;
  }

  list.innerHTML = filtered.map(s => {
    const enabled = s.enabled !== false;
    const status = s.status || 'IDLE';
    const isRunning = status === 'RUNNING';
    
    return `
      <div class="strat-card">
        <div class="strat-card-header">
          <div class="strat-card-name">
            <span class="status-dot ${status.toLowerCase()}"></span>
            ${escHtml(s.name)}
            ${
              s.mode === 'LIVE'
                ? '<span class="badge badge-mode badge-live" id="mode-badge-' + escHtml(s.name) + '">⚡ LIVE</span>'
                : '<span class="badge badge-mode badge-mock" id="mode-badge-' + escHtml(s.name) + '">🧪 MOCK</span>'
            }
            ${enabled ? '<span class="badge badge-enabled">Enabled</span>' : '<span class="badge badge-disabled">Disabled</span>'}
            ${status !== 'IDLE' ? `<span class="badge badge-${status.toLowerCase()}">${status}</span>` : ''}
          </div>
          <div class="strat-card-actions">
            
            <button 
              class="btn btn-secondary btn-sm btn-mode"
              id="mode-btn-${escHtml(s.name)}"
              onclick="toggleMode('${escHtml(s.name)}')"
              title="${!s.can_change_mode ? escHtml(s.mode_change_reason || 'Cannot change mode') : ''}">
              ${s.mode === 'LIVE' ? 'Switch to MOCK' : 'Switch to LIVE'}
            </button>
            
${!isRunning ? `<button class="btn btn-success btn-sm" onclick="startStrategy('${escHtml(s.name)}')">Start</button>` : ''}
            ${isRunning ? `<button class="btn btn-danger btn-sm" onclick="stopStrategy('${escHtml(s.name)}')">Stop</button>` : ''}
            <button class="btn btn-secondary btn-sm" onclick="openLogs('${escHtml(s.name)}')">Logs</button>
            <button class="btn btn-secondary btn-sm" onclick="viewDetails('${escHtml(s.name)}')">View</button>
            <button class="btn btn-primary btn-sm" onclick="editStrategy('${escHtml(s.name)}')">Edit</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleEnabled('${escHtml(s.name)}', ${enabled})">${enabled ? 'Disable' : 'Enable'}</button>
            <button class="btn btn-warning btn-sm" onclick="cloneStrategy('${escHtml(s.name)}')">Clone</button>
            <button class="btn btn-danger btn-sm" onclick="deleteStrategy('${escHtml(s.name)}')">Delete</button>
          </div>
        </div>
        <div class="strat-card-meta">
          <span><strong>Type:</strong> ${escHtml(s.strategy_type||'N/A')}</span>

function formatDate(dateStr) {
  if (!dateStr) return 'Never';
  const d = new Date(dateStr);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

// ====== RUNNER STATUS ======
async function refreshStatus() {
  try {
    const r = await api('GET', '/runner/status');
    const indicator = $('runner-indicator');
    const status = $('runner-status');
    
    if (r.runner_active && r.is_running && r.strategies_active > 0) {

  }
}

function fmt2(n) {
  const v = Number(n || 0);
  return Number.isFinite(v) ? v.toFixed(2) : '0.00';
}

function fmtRuntime(sec) {
  const s = Number(sec || 0);
  if (!Number.isFinite(s) || s <= 0) return '0m';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = Math.floor(s % 60);
  if (h > 0) return `${h}h ${m}m ${ss}s`;
  return `${m}m ${ss}s`;
}

function deltaClass(v) {
  const n = Number(v || 0);
  if (!Number.isFinite(n)) return 'delta-neutral';
  if (n > 0.05) return 'delta-pos';
  if (n < -0.05) return 'delta-neg';
  return 'delta-neutral';
}

function collapseBySymbol(rows) {
  const items = Array.isArray(rows) ? rows : [];
  const map = new Map();

  for (const p of items) {
    const key = String(p.symbol || '').trim() || 'UNKNOWN';
    if (!map.has(key)) {
      map.set(key, {
        ...p,
        symbol: key
      });
      continue;
    }
    const x = map.get(key);
    x.qty = Number(x.qty || 0) + Number(p.qty || 0);
    x.realized_pnl = Number(x.realized_pnl || 0) + Number(p.realized_pnl || 0);
    x.unrealized_pnl = Number(x.unrealized_pnl || 0) + Number(p.unrealized_pnl || 0);
    x.total_pnl = Number(x.total_pnl || 0) + Number(p.total_pnl || 0);
    x.delta = Number(x.delta || 0) + Number(p.delta || 0);
    x.gamma = Number(x.gamma || 0) + Number(p.gamma || 0);
    x.theta = Number(x.theta || 0) + Number(p.theta || 0);
    x.vega = Number(x.vega || 0) + Number(p.vega || 0);

    if (x.side && p.side && x.side !== p.side) x.side = 'MIXED';
    if (!x.side && p.side) x.side = p.side;
    if (!x.owner && p.owner) x.owner = p.owner;
    if (!x.source && (p.source || p.position_source)) x.source = p.source || p.position_source;
    if (x.exit_price == null && p.exit_price != null) x.exit_price = p.exit_price;
    if ((x.entry_price ?? x.avg_price) == null && (p.entry_price ?? p.avg_price) != null) {
      x.entry_price = p.entry_price;
      x.avg_price = p.avg_price;
    }
    if (x.ltp == null && p.ltp != null) x.ltp = p.ltp;
    if (!x.status && p.status) x.status = p.status;
  }

  const sideRank = (side) => {
    const s = String(side || '').toUpperCase();
    if (s === 'SELL') return 0;
    if (s === 'BUY') return 1;
    if (s === 'MIXED') return 2;
    return 3;
  };

  return [...map.values()].sort((a, b) => {
    const sym = String(a.symbol || '').localeCompare(String(b.symbol || ''));
    if (sym !== 0) return sym;
    const side = sideRank(a.side) - sideRank(b.side);
    if (side !== 0) return side;
    return String(a.status || '').localeCompare(String(b.status || ''));
  });
}

      <thead>
        <tr>
          <th>Symbol</th>
          <th>Side</th>
          <th>Qty</th>
          <th>Entry</th>
          <th>Exit</th>
          <th>LTP</th>
          <th>Realized</th>
          <th>Unrealized</th>
          <th>Total PnL</th>
          <th>Delta</th>
          <th>Gamma</th>
          <th>Theta</th>
          <th>Vega</th>
          <th>Status</th>
          <th>Source</th>
          <th>Owner</th>
        </tr>
      </thead>
      <tbody>
        ${positions.map(p => `
          <tr>
            <td>${escHtml(p.symbol || '')}</td>

            <td style="color:${Number(p.unrealized_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(p.unrealized_pnl)}</td>
            <td style="color:${Number(p.total_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(p.total_pnl)}</td>
            <td class="${deltaClass(p.delta)}">${fmt2(p.delta)}</td>

            <td>${fmt2(p.theta)}</td>
            <td>${fmt2(p.vega)}</td>

async function loadLiveMonitor() {
  try {
    const r = await api('GET', '/monitoring/live-positions-overview');
    const s = r.summary || {};

    const summaryHtml = `
      <div class="monitor-card"><div class="monitor-label">Open Positions</div><div class="monitor-value">${Number(s.total_open_positions||0)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Strategy Linked</div><div class="monitor-value">${Number(s.strategy_linked_positions||0)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Orphan</div><div class="monitor-value">${Number(s.orphan_positions||0)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Tracked Legs</div><div class="monitor-value">${Number(s.total_strategy_legs_tracked||0)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Closed Legs</div><div class="monitor-value">${Number(s.total_closed_strategy_legs||0)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Portfolio Realized</div><div class="monitor-value" style="color:${Number(s.portfolio_realized_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(s.portfolio_realized_pnl)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Portfolio Unrealized</div><div class="monitor-value" style="color:${Number(s.portfolio_unrealized_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(s.portfolio_unrealized_pnl)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Portfolio PnL</div><div class="monitor-value" style="color:${Number(s.portfolio_total_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(s.portfolio_total_pnl)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Portfolio Delta</div><div class="monitor-value">${fmt2(s.portfolio_combined_delta)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Portfolio Gamma</div><div class="monitor-value">${fmt2(s.portfolio_combined_gamma)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Portfolio Theta</div><div class="monitor-value">${fmt2(s.portfolio_combined_theta)}</div></div>
      <div class="monitor-card"><div class="monitor-label">Portfolio Vega</div><div class="monitor-value">${fmt2(s.portfolio_combined_vega)}</div></div>
    `;
    setHtmlIfChanged('monitor-summary', 'summary', summaryHtml);

    const groups = r.strategy_groups || [];
    const sortedGroups = [...groups].sort((a, b) =>
      String(a.strategy_name || '').localeCompare(String(b.strategy_name || ''))
    );
    if (!groups.length) {
      setHtmlIfChanged('monitor-strategy-groups', 'groups', '<div style="color:var(--muted);font-size:12px;">No strategy-linked positions.</div>');
    } else {
      const groupsHtml = sortedGroups.map(g => {
        const allRows = g.all_legs || g.positions || [];
        const activeRowsRaw = (g.active_leg_rows && g.active_leg_rows.length)
          ? g.active_leg_rows
          : allRows.filter(x => String(x.status || 'ACTIVE').toUpperCase() !== 'CLOSED');
        const closedRowsRaw = (g.closed_leg_rows && g.closed_leg_rows.length)
          ? g.closed_leg_rows
          : allRows.filter(x => String(x.status || '').toUpperCase() === 'CLOSED');

        return `
          <div class="strat-card">
            <div class="strat-card-header">
              <div class="strat-card-name">
                ${escHtml(g.strategy_name)}
                ${
                  g.mode === 'LIVE'
                    ? '<span class="badge badge-mode badge-live">⚡ LIVE</span>'
                    : '<span class="badge badge-mode badge-mock">🧪 MOCK</span>'
                }
                ${g.active ? '<span class="badge badge-running">ACTIVE</span>' : '<span class="badge badge-stopped">INACTIVE</span>'}
              </div>
              <div style="font-size:12px;color:${Number(g.total_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'};">PnL ${fmt2(g.total_pnl)}</div>
            </div>
            <div class="strat-card-meta">
              <span><strong>Runtime:</strong> ${fmtRuntime(g.runtime_seconds)} ${g.runtime_state === 'RUNNING' ? '(Live)' : (g.runtime_state === 'COMPLETED' ? '(Completed)' : '')}</span>
              <span><strong>Realized:</strong> ${fmt2(g.realized_pnl)}</span>
              <span><strong>Unrealized:</strong> ${fmt2(g.unrealized_pnl)}</span>
              <span><strong>Active Legs:</strong> ${Number(g.active_legs || activeRowsRaw.length || 0)}</span>
              <span><strong>Closed Legs:</strong> ${Number(g.closed_legs || closedRowsRaw.length || 0)}</span>
              <span><strong>Delta:</strong> <span class="combined-delta-pill ${deltaClass(g.combined_delta)}">${fmt2(g.combined_delta)}</span></span>
              <span><strong>Gamma:</strong> ${fmt2(g.combined_gamma)}</span>
              <span><strong>Theta:</strong> ${fmt2(g.combined_theta)}</span>
              <span><strong>Vega:</strong> ${fmt2(g.combined_vega)}</span>
            </div>
            <div class="monitor-tables-stack">
              <div class="monitor-subtitle" style="margin-top:10px;">Active Legs</div>
              ${renderMonitorTable(collapseBySymbol(activeRowsRaw))}
              <div class="monitor-subtitle" style="margin-top:12px;">Closed Legs</div>
              ${renderMonitorTable(collapseBySymbol(closedRowsRaw))}
            </div>
          </div>
        `;
      }).join('');
      setHtmlIfChanged('monitor-strategy-groups', 'groups', groupsHtml);
    }

    const oa = r.orphan_aggregate || {};
    const orphansHtml = `
      <div class="strat-card-meta" style="margin-bottom:8px;">
        <span><strong>Legs:</strong> ${Number(oa.leg_count || 0)}</span>
        <span><strong>Delta:</strong> ${fmt2(oa.combined_delta)}</span>
        <span><strong>Gamma:</strong> ${fmt2(oa.combined_gamma)}</span>
        <span><strong>Theta:</strong> ${fmt2(oa.combined_theta)}</span>
        <span><strong>Vega:</strong> ${fmt2(oa.combined_vega)}</span>
        <span><strong>Realized:</strong> <span style="color:${Number(oa.realized_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(oa.realized_pnl)}</span></span>
        <span><strong>Unrealized:</strong> <span style="color:${Number(oa.unrealized_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(oa.unrealized_pnl)}</span></span>
        <span><strong>PnL:</strong> <span style="color:${Number(oa.total_pnl||0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${fmt2(oa.total_pnl)}</span></span>
      </div>
      ${renderMonitorTable(collapseBySymbol(r.orphan_positions || []), true)}
    `;
    setHtmlIfChanged('monitor-orphans', 'orphans', orphansHtml);
  } catch(e) {
    monitorRenderCache.summary = '';
    monitorRenderCache.groups = '';
    monitorRenderCache.orphans = '';
    $('monitor-summary').innerHTML = '';
    $('monitor-strategy-groups').innerHTML = '';
    $('monitor-orphans').innerHTML = `<div style="color:var(--danger);font-size:12px;">Failed to load live monitor: ${escHtml(e.message)}</div>`;
  }
}

function importStrategy() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    try {
      const text = await file.text();
      const config = JSON.parse(text);
      await api('POST', '/strategy/config/save-all', config);
      toast('Strategy imported');
      loadStrategies();
    } catch(err) {
      toast('Import failed: ' + err.message, 'error');
    }
  };
  input.click();
}

// ====== ENABLE / DISABLE ======
function toggleEnabled(name, currentlyEnabled) {
  currentToggleStrategy = { name, enabled: currentlyEnabled };
  $('toggle-modal-title').textContent = currentlyEnabled ? 'Disable Strategy' : 'Enable Strategy';
  $('toggle-modal-message').textContent = currentlyEnabled
    ? `Disable strategy "${name}"? It will stop executing new entries.`
    : `Enable strategy "${name}"? It will resume normal operation.`;
  $('toggle-modal-confirm').className = currentlyEnabled
    ? 'btn btn-danger'
    : 'btn btn-success';
  $('toggle-modal-confirm').textContent = currentlyEnabled ? 'Disable' : 'Enable';
  $('toggle-modal').classList.add('show');
}

async function confirmToggle() {
  if (!currentToggleStrategy) return;
  const { name, enabled } = currentToggleStrategy;
  closeModal('toggle-modal');
  try {
    const existing = allStrategies.find(s => s.name === name) || {};
    await api('POST', `/strategy/config/save-all`, {
      ...existing,
      name,
      enabled: !enabled,
    });
    toast(`Strategy "${name}" ${enabled ? 'disabled' : 'enabled'}`);
    loadStrategies();
  } catch (e) {
    toast('Toggle failed: ' + e.message, 'error');
  }
  currentToggleStrategy = null;
}

// ====== MODE TOGGLE (FIXED) ======
async function toggleMode(name) {
  const btn = document.getElementById('mode-btn-' + name);
  if (!btn) return;

  btn.disabled = true;
  const originalText = btn.textContent;

  try {
    // Fetch current mode status
    const status = await api('GET', `/strategy/${encodeURIComponent(name)}/mode`);
    if (!status.can_change) {
      toast(status.reason || 'Mode change not allowed', 'warning');
      btn.disabled = false;
      btn.textContent = originalText;
      return;
    }

    const currentMode = status.mode;
    const newMode = currentMode === 'LIVE' ? 'MOCK' : 'LIVE';

    btn.textContent = 'Switching...';

    await api('POST', `/strategy/${encodeURIComponent(name)}/mode`, { mode: newMode });

    // Update local data immediately to avoid waiting for reload
    const strategy = allStrategies.find(s => s.name === name);
    if (strategy) {
      strategy.mode = newMode;
      // Also update can_change (should now be the opposite, but we don't know)
      strategy.can_change_mode = !strategy.can_change_mode; // approximate, but fine for UI
    }
    renderStrategies(); // re-render immediately

    toast(`Mode changed to ${newMode}`, 'success');
  } catch (e) {
    toast('Mode change failed: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

document.querySelectorAll('.modal').forEach((modalEl) => {
