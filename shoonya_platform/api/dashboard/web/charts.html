/* ─── ZIGZAG CALCULATION ─── */
function calcZigZag(data,highLowLength,mode){
  if(data.length<highLowLength*2+1)return[];
  const n=data.length,hll=highLowLength,win=hll*2+1;
  const getHigh=i=>mode==='Body(OC)'?Math.max(data[i].open,data[i].close):data[i].high;
  const getLow=i=>mode==='Body(OC)'?Math.min(data[i].open,data[i].close):data[i].low;
  const pivots=[];
  let dirUp=null,prevHigh=NaN,prevLow=NaN,tHigh=0,tLow=0;
  for(let i=hll;i<n-hll;i++){
    let highest=-Infinity,lowest=Infinity;
    for(let j=i-hll;j<=i+hll;j++){highest=Math.max(highest,getHigh(j));lowest=Math.min(lowest,getLow(j));}
    const isSwHigh=highest===getHigh(i);
    const isSwLow=lowest===getLow(i);
    if(dirUp===null){
      if(isSwHigh){prevHigh=getHigh(i);tHigh=i;dirUp=false;}
      else if(isSwLow){prevLow=getLow(i);tLow=i;dirUp=true;}
      continue;
    }
    if(dirUp){
      if(isSwLow&&getLow(i)<prevLow){prevLow=getLow(i);tLow=i;if(pivots.length)pivots.pop();}
      if(isSwHigh&&getHigh(i)>prevLow){
        pivots.push({time:data[tLow].time,value:prevLow});
        prevHigh=getHigh(i);tHigh=i;dirUp=false;
      }
    }else{
      if(isSwHigh&&getHigh(i)>prevHigh){prevHigh=getHigh(i);tHigh=i;if(pivots.length)pivots.pop();}
      if(isSwLow&&getLow(i)<prevHigh){
        pivots.push({time:data[tHigh].time,value:prevHigh});
        prevLow=getLow(i);tLow=i;dirUp=true;
      }
    }
  }
  // Add final pivot
  if(dirUp!==null){
    if(dirUp)pivots.push({time:data[tLow].time,value:prevLow});
    else pivots.push({time:data[tHigh].time,value:prevHigh});
  }
  return pivots;
}

/* ─── HA SMOOTH + BULL/BEAR POWER ─── */
function calcEMAArray(arr,period){
  if(!arr.length)return[];
  const k=2/(period+1),r=[arr[0]];
  for(let i=1;i<arr.length;i++)r.push(arr[i]*k+r[i-1]*(1-k));
  return r;
}
function calcHASmooth(data,numSmooth){
  if(data.length<2)return{strength:[],reference:[]};
  // Level 1
  const haO1=[],haH1=[],haL1=[],haC1=[];
  for(let i=0;i<data.length;i++){
    const c=data[i];
    const hc=(c.open+c.high+c.low+c.close)/4;
    const ho=i===0?(c.open+c.close)/2:(haO1[i-1]+haC1[i-1])/2;
    haC1.push(hc);haO1.push(ho);
    haH1.push(Math.max(c.high,ho,hc));haL1.push(Math.min(c.low,ho,hc));
  }
  // Level 2
  const haO2=[],haH2=[],haL2=[],haC2=[];
  for(let i=0;i<data.length;i++){
    const hc=(haO1[i]+haH1[i]+haL1[i]+haC1[i])/4;
    const ho=i===0?(haO1[0]+haC1[0])/2:(haO2[i-1]+haC2[i-1])/2;
    haC2.push(hc);haO2.push(ho);
    haH2.push(Math.max(haH1[i],ho,hc));haL2.push(Math.min(haL1[i],ho,hc));
  }
  // Level 3
  const haO3=[],haH3=[],haL3=[],haC3=[];
  for(let i=0;i<data.length;i++){
    const hc=(haO2[i]+haH2[i]+haL2[i]+haC2[i])/4;
    const ho=i===0?(haO2[0]+haC2[0])/2:(haO3[i-1]+haC3[i-1])/2;
    haC3.push(hc);haO3.push(ho);
    haH3.push(Math.max(haH2[i],ho,hc));haL3.push(Math.min(haL2[i],ho,hc));
  }
  // Level 4
  const haO4=[],haH4=[],haL4=[],haC4=[];
  for(let i=0;i<data.length;i++){
    const hc=(haO3[i]+haH3[i]+haL3[i]+haC3[i])/4;
    const ho=i===0?(haO3[0]+haC3[0])/2:(haO4[i-1]+haC4[i-1])/2;
    haC4.push(hc);haO4.push(ho);
    haH4.push(Math.max(haH3[i],ho,hc));haL4.push(Math.min(haL3[i],ho,hc));
  }
  // Select level
  const haClose=numSmooth===1?haC1:numSmooth===2?haC2:numSmooth===3?haC3:haC4;
  // sr3 = (high+low+close)/3 from original data
  const sr3=data.map(c=>(c.high+c.low+c.close)/3);
  // Bull/Bear Power (EMAlength=65)
  const emaLen=65;
  const ema1=calcEMAArray(haClose,emaLen);
  const ema2=calcEMAArray(ema1,emaLen);
  const ema3=calcEMAArray(ema2,emaLen);
  const tma1=ema1.map((v,i)=>3*v-3*ema2[i]+ema3[i]);
  const ema4=calcEMAArray(tma1,emaLen);
  const ema5=calcEMAArray(ema4,emaLen);
  const ema6=calcEMAArray(ema5,emaLen);
  const tma2=ema4.map((v,i)=>3*v-3*ema5[i]+ema6[i]);
  const reference=tma1.map((v,i)=>v+(v-tma2[i]));
  const ema7=calcEMAArray(sr3,emaLen);
  const ema8=calcEMAArray(ema7,emaLen);
  const ema9=calcEMAArray(ema8,emaLen);
  const tma3=ema7.map((v,i)=>3*v-3*ema8[i]+ema9[i]);
  const ema10=calcEMAArray(tma3,emaLen);
  const ema11=calcEMAArray(ema10,emaLen);
  const ema12=calcEMAArray(ema11,emaLen);
  const tma4=ema10.map((v,i)=>3*v-3*ema11[i]+ema12[i]);
  const strength=tma3.map((v,i)=>v+(v-tma4[i]));
  // Build output with per-bar color for strength
  const strengthPts=[],refPts=[];
  for(let i=0;i<data.length;i++){
    const t=data[i].time;
    strengthPts.push({time:t,value:strength[i],color:strength[i]>reference[i]?'#00fc26':'#ff0000'});
    refPts.push({time:t,value:reference[i]});
  }
  return{strength:strengthPts,reference:refPts};
}

/* ─── UNIVERSAL LEVELS ─── */
function calcUniversalLevels(data,autoLevels,levelCount,distancePct){
  if(!data.length)return[];
  // EMA(open,5)
  const opens=data.map(c=>c.open);
  const emaO=calcEMAArray(opens,5);
  const lastEma=emaO[emaO.length-1];
  const lastClose=data[data.length-1].close;
  const xRaw=Math.round(Math.sqrt(lastEma));
  const SCALE=100000000;
  const xScaled=Math.round(xRaw*SCALE);
  // Auto level count
  let lc=levelCount;
  if(autoLevels){
    if(lastClose>100000)lc=1;
    else if(lastClose>70000)lc=2;
    else if(lastClose>30000)lc=3;
    else if(lastClose>5000)lc=4;
    else if(lastClose>500)lc=5;
    else if(lastClose>1)lc=6;
    else if(lastClose>0.1)lc=7;
    else lc=8;
  }
  const stepScaled=Math.max(Math.round(0.001*SCALE),Math.round(SCALE/Math.pow(2,lc-1)));
  const ltp=lastClose;
  const upperBound=ltp*(1+distancePct/100);
  const lowerBound=ltp*(1-distancePct/100);
  const levels=[];
  let cur=xScaled-SCALE;
  let safety=0;
  while(cur<=xScaled+SCALE&&safety<10000){
    const val=cur/SCALE;
    const lvl=val*val;
    if(lvl>=lowerBound&&lvl<=upperBound)levels.push(lvl);
    cur+=stepScaled;safety++;
  }
  return levels;
}

/* ─── SUPPORT / RESISTANCE BOXES ─── */
function calcSupportResistance(data,lookbackPeriod,volLen,boxWidth){
  if(data.length<lookbackPeriod*2+1)return{supports:[],resistances:[],markers:[]};
  const n=data.length,lb=lookbackPeriod;
  // Delta volume
  const vol=[];
  let isBuy=true;
  for(let i=0;i<n;i++){
    if(data[i].close>data[i].open)isBuy=true;
    else if(data[i].close<data[i].open)isBuy=false;
    vol.push(isBuy?(data[i].volume||0):-(data[i].volume||0));
  }
  // Running highest/lowest of vol/2.5 over volLen
  const volScaled=vol.map(v=>v/2.5);
  const volHi=[],volLo=[];
  for(let i=0;i<n;i++){
    let hi=-Infinity,lo=Infinity;
    for(let j=Math.max(0,i-volLen+1);j<=i;j++){hi=Math.max(hi,volScaled[j]);lo=Math.min(lo,volScaled[j]);}
    volHi.push(hi);volLo.push(lo);
  }
  // ATR(200) for box width
  let atrVal=0;
  if(n>200){
    const trs=[];
    for(let i=1;i<n;i++){
      trs.push(Math.max(data[i].high-data[i].low,Math.abs(data[i].high-data[i-1].close),Math.abs(data[i].low-data[i-1].close)));
    }
    atrVal=trs.slice(-200).reduce((a,b)=>a+b,0)/200;
  }else if(n>1){
    const trs=[];
    for(let i=1;i<n;i++)trs.push(Math.max(data[i].high-data[i].low,Math.abs(data[i].high-data[i-1].close),Math.abs(data[i].low-data[i-1].close)));
    atrVal=trs.reduce((a,b)=>a+b,0)/trs.length;
  }
  const withd=atrVal*boxWidth;
  // Find pivots and build boxes
  const supports=[],resistances=[],markers=[];
  let supLevel=NaN,supLevel1=NaN,resLevel=NaN,resLevel1=NaN;
  let brekoutRes=false,brekoutSup=false,resHolds=false,supHolds=false;
  let resIsSup=false,supIsRes=false;
  for(let i=lb;i<n-lb;i++){
    // Pivot high: data[i] is highest high in [i-lb..i+lb]
    let isPivHigh=true,isPivLow=true;
    for(let j=i-lb;j<=i+lb;j++){
      if(j!==i&&data[j].high>=data[i].high)isPivHigh=false;
      if(j!==i&&data[j].low<=data[i].low)isPivLow=false;
    }
    const barIdx=i+lb; // the bar where pivot is confirmed (offset by lb)
    if(barIdx>=n)continue;
    const curVol=vol[barIdx];
    // Support: pivot low + positive volume
    if(isPivLow&&curVol>volHi[barIdx]){
      supLevel=data[i].low;
      supLevel1=supLevel-withd;
      supports.push({timeStart:data[i].time,timeEnd:data[barIdx].time,top:supLevel,bottom:supLevel1,broken:false});
    }
    // Resistance: pivot high + negative volume
    if(isPivHigh&&curVol<volLo[barIdx]){
      resLevel=data[i].high;
      resLevel1=resLevel+withd;
      resistances.push({timeStart:data[i].time,timeEnd:data[barIdx].time,top:resLevel1,bottom:resLevel,broken:false});
    }
  }
  // Extend boxes to current bar and detect breakouts
  const lastTime=data[n-1].time;
  for(const box of supports){
    box.timeEnd=lastTime;
    // Check breakout: price went below support bottom
    for(let i=0;i<n;i++){
      if(data[i].time>box.timeStart&&data[i].high<box.bottom){box.broken=true;break;}
    }
  }
  for(const box of resistances){
    box.timeEnd=lastTime;
    for(let i=0;i<n;i++){
      if(data[i].time>box.timeStart&&data[i].low>box.top){box.broken=true;break;}
    }
  }
  // Markers for breakouts
  if(!isNaN(supLevel)&&!isNaN(resLevel)){
    for(let i=1;i<n;i++){
      const prevBrekRes=i>1&&data[i-1].low>resLevel1;
      const curResHolds=i>0&&data[i].high<resLevel;
      const curSupHolds=i>0&&data[i].low>supLevel;
      const curBrekSup=i>0&&data[i].high<supLevel1;
      if(curResHolds)markers.push({time:data[i].time,position:'aboveBar',color:'#e92929',shape:'circle',text:'◆'});
      if(curSupHolds)markers.push({time:data[i].time,position:'belowBar',color:'#20ca26',shape:'circle',text:'◆'});
    }
  }
  return{supports,resistances,markers};
}

/* ─── APPLY PINE INDICATORS ─── */
function applyPineIndicators(dataSource){
  // Remove old pine series
  for(const s of pineIndSeries){try{chart.removeSeries(s);}catch(e){}}
  if(pineIndSeries._priceLines){for(const pl of pineIndSeries._priceLines){try{mainSeries.removePriceLine(pl);}catch(e){}};}
  // Clear markers
  try{mainSeries.setMarkers([]);}catch(e){}
  pineIndSeries=[];
  const data=dataSource||rawCandles;
  if(!data.length||!chart)return;

  // 1. ZigZag
  if(document.getElementById('chkZigZag')&&document.getElementById('chkZigZag').checked){
    const pts=calcZigZag(data,3,'Wicks(HL)');
    if(pts.length>1){
      const s=addLineSeries({color:'#ffff00',lineWidth:1});
      s.setData(pts);pineIndSeries.push(s);
    }
  }

  // 2. HA Smooth Trend
  if(document.getElementById('chkHASmooth')&&document.getElementById('chkHASmooth').checked){
    const ha=calcHASmooth(data,2);
    if(ha.strength.length){
      // Strength line (thick, colored per bar)
      const sStr=chart.addLineSeries({lineWidth:3,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,title:'Strength'});
      sStr.setData(ha.strength);pineIndSeries.push(sStr);
      // Reference line (thin gray)
      const sRef=addLineSeries({color:'rgba(120,123,134,0.46)',lineWidth:1,title:'Reference'});
      sRef.setData(ha.reference);pineIndSeries.push(sRef);
    }
  }

  // 3. Universal Levels
  if(document.getElementById('chkLevels')&&document.getElementById('chkLevels').checked){
    const levels=calcUniversalLevels(data,true,5,0.5);
    for(const lvl of levels){
      try{
        const pl=mainSeries.createPriceLine({price:lvl,color:'#edeeeecc',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:true,title:''});
        // Store for cleanup — we'll track price line objects in a sub-array
        if(!pineIndSeries._priceLines)pineIndSeries._priceLines=[];
        pineIndSeries._priceLines.push(pl);
      }catch(e){}
    }
  }

  // 4. S/R Boxes (rendered as area bands)
  if(document.getElementById('chkSRBoxes')&&document.getElementById('chkSRBoxes').checked){
    const sr=calcSupportResistance(data,20,2,1);
    // Draw support boxes as filled bands
    for(const box of sr.supports){
      const pts=data.filter(c=>c.time>=box.timeStart&&c.time<=box.timeEnd).map(c=>({time:c.time}));
      if(pts.length<2)continue;
      const topPts=pts.map(p=>({time:p.time,value:box.top}));
      const botPts=pts.map(p=>({time:p.time,value:box.bottom}));
      const borderColor=box.broken?'#ff0000':'#22c55e';
      const fillColor=box.broken?'rgba(255,0,0,0.12)':'rgba(34,197,94,0.15)';
      const sTop=chart.addLineSeries({color:borderColor,lineWidth:1,lineStyle:box.broken?LightweightCharts.LineStyle.Dashed:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
      sTop.setData(topPts);pineIndSeries.push(sTop);
      const sBot=chart.addLineSeries({color:borderColor,lineWidth:1,lineStyle:box.broken?LightweightCharts.LineStyle.Dashed:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
      sBot.setData(botPts);pineIndSeries.push(sBot);
    }
    for(const box of sr.resistances){
      const pts=data.filter(c=>c.time>=box.timeStart&&c.time<=box.timeEnd).map(c=>({time:c.time}));
      if(pts.length<2)continue;
      const topPts=pts.map(p=>({time:p.time,value:box.top}));
      const botPts=pts.map(p=>({time:p.time,value:box.bottom}));
      const borderColor=box.broken?'#22c55e':'#ef4444';
      const fillColor=box.broken?'rgba(34,197,94,0.12)':'rgba(239,68,68,0.15)';
      const sTop=chart.addLineSeries({color:borderColor,lineWidth:1,lineStyle:box.broken?LightweightCharts.LineStyle.Dashed:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
      sTop.setData(topPts);pineIndSeries.push(sTop);
      const sBot=chart.addLineSeries({color:borderColor,lineWidth:1,lineStyle:box.broken?LightweightCharts.LineStyle.Dashed:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
      sBot.setData(botPts);pineIndSeries.push(sBot);
    }
    // Add markers for S/R holds
    if(sr.markers.length){
      try{mainSeries.setMarkers(sr.markers.sort((a,b)=>a.time-b.time));}catch(e){}
    }
  }
}

/* ─── COMBINED PREMIUM CHART ─── */
function calcCombinedCandles(){
  if(!rawCandles.length||!overlays.length)return rawCandles;
  // Build time-aligned maps
  const timeMap={};
  for(const c of rawCandles)timeMap[c.time]={open:c.open,high:c.high,low:c.low,close:c.close,volume:c.volume||0};
  for(const ov of overlays){
    if(!ov.candles)continue;
    for(const c of ov.candles){
      if(!timeMap[c.time])timeMap[c.time]={open:0,high:0,low:0,close:0,volume:0};
      timeMap[c.time].open+=c.open;
      timeMap[c.time].high+=c.high;
      timeMap[c.time].low+=c.low;
      timeMap[c.time].close+=c.close;
      timeMap[c.time].volume+=(c.volume||0);
    }
  }
  // Only add main candle values (they're already the base)
  return Object.entries(timeMap).map(([t,v])=>({time:+t,...v})).sort((a,b)=>a.time-b.time);
}

function applyIndicators(dataSource){
  Object.values(indSeries).forEach(v=>{if(Array.isArray(v))v.forEach(s=>{try{chart.removeSeries(s);}catch(e){}});else try{chart.removeSeries(v);}catch(e){}});
  indSeries={};
  const candleData=dataSource||rawCandles;
  if(!candleData.length)return;
  for(const inst of activeIndicators){
    const cfg=inst.cfg;
    const lo={color:cfg.color,lineWidth:cfg.lineWidth||1.5};
    try{
      if(inst.type==='sma'){const pts=calcSMA(candleData,cfg.period);if(pts.length){const s=addLineSeries(lo);s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='ema'){const pts=calcEMA(candleData,cfg.period);if(pts.length){const s=addLineSeries(lo);s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='wma'){const pts=calcWMA(candleData,cfg.period);if(pts.length){const s=addLineSeries(lo);s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='dema'){const pts=calcDEMA(candleData,cfg.period);if(pts.length){const s=addLineSeries(lo);s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='bb'){const b=calcBB(candleData,cfg.period,cfg.stdDev||2);if(b.upper.length){const ds={lineStyle:LightweightCharts.LineStyle.Dashed,color:cfg.color,lineWidth:1};const sU=addLineSeries(ds);sU.setData(b.upper);const sM=addLineSeries({color:cfg.color,lineWidth:1.5});sM.setData(b.mid);const sL=addLineSeries(ds);sL.setData(b.lower);indSeries[inst.uid]=[sU,sM,sL];}}
      else if(inst.type==='kc'){const b=calcKeltner(candleData,cfg.period,cfg.mult||2);if(b.upper.length){const ds={lineStyle:LightweightCharts.LineStyle.Dashed,color:cfg.color,lineWidth:1};const sU=addLineSeries(ds);sU.setData(b.upper);const sM=addLineSeries({color:cfg.color,lineWidth:1.5});sM.setData(b.mid);const sL=addLineSeries(ds);sL.setData(b.lower);indSeries[inst.uid]=[sU,sM,sL];}}
      else if(inst.type==='dc'){const b=calcDonchian(candleData,cfg.period);if(b.upper.length){const ds={lineStyle:LightweightCharts.LineStyle.Dashed,color:cfg.color,lineWidth:1};const sU=addLineSeries(ds);sU.setData(b.upper);const sM=addLineSeries({color:cfg.color,lineWidth:1});sM.setData(b.mid);const sL=addLineSeries(ds);sL.setData(b.lower);indSeries[inst.uid]=[sU,sM,sL];}}
      else if(inst.type==='vwap'){const pts=calcVWAP(candleData);if(pts.length){const s=addLineSeries({color:cfg.color,lineWidth:cfg.lineWidth||2});s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='psar'){const pts=calcPSAR(candleData,cfg.step||0.02,cfg.max||0.2);if(pts.length){const s=chart.addLineSeries({color:cfg.color,lineWidth:0,pointMarkersVisible:true,pointMarkersRadius:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='pivots'){const p=calcPivots(candleData);if(p.pivot.length){const sP=addLineSeries({color:cfg.color,lineStyle:LightweightCharts.LineStyle.Dotted,lineWidth:1});sP.setData(p.pivot);const sR=addLineSeries({color:activeClr.dn,lineStyle:LightweightCharts.LineStyle.Dotted,lineWidth:1});sR.setData(p.r1);const sR2=addLineSeries({color:hexRgba(activeClr.dn,.6),lineStyle:LightweightCharts.LineStyle.Dotted,lineWidth:1});sR2.setData(p.r2);const sS=addLineSeries({color:activeClr.up,lineStyle:LightweightCharts.LineStyle.Dotted,lineWidth:1});sS.setData(p.s1);const sS2=addLineSeries({color:hexRgba(activeClr.up,.6),lineStyle:LightweightCharts.LineStyle.Dotted,lineWidth:1});sS2.setData(p.s2);indSeries[inst.uid]=[sP,sR,sR2,sS,sS2];}}
      else if(inst.type==='supertrend'){const st=calcSupertrend(candleData,cfg.period,cfg.mult);if(st.up.length){const sU=addLineSeries({color:cfg.upColor||activeClr.up,lineWidth:cfg.lineWidth||2});sU.setData(st.up);const sD=addLineSeries({color:cfg.dnColor||activeClr.dn,lineWidth:cfg.lineWidth||2});sD.setData(st.dn);indSeries[inst.uid]=[sU,sD];}}
      else if(inst.type==='rsi'){const pts=calcRSI(candleData,cfg.period||14);if(pts.length){const s=addLineSeries({color:cfg.color,lineWidth:1.5});s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='atr'){const pts=calcATR(candleData,cfg.period||14);if(pts.length){const s=addLineSeries({color:cfg.color,lineWidth:1.5});s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='cci'){const pts=calcCCI(candleData,cfg.period||20);if(pts.length){const s=addLineSeries({color:cfg.color,lineWidth:1.5});s.setData(pts);indSeries[inst.uid]=s;}}
      else if(inst.type==='adx'){const pts=calcADX(candleData,cfg.period||14);if(pts.length){const s=addLineSeries({color:cfg.color,lineWidth:1.5});s.setData(pts);indSeries[inst.uid]=s;}}
    }catch(err){console.error('Indicator error',inst.uid,err);}
  }
}

/* ─── DRAWING TOOLS ─── */
function showHint(msg){const h=document.getElementById('drawHint');h.textContent=msg;h.style.display=msg?'block':'none';}

function clearPreview(){
  if(previewSeries){try{chart.removeSeries(previewSeries);}catch(x){} previewSeries=null;}
}
function updateDrawPreview(ts,price){
  if(!drawClicks.length)return;
  clearPreview();
  try{
    previewSeries=chart.addLineSeries({color:'rgba(255,255,255,0.4)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    const p1=drawClicks[0];
    if(drawTool==='hray'||drawTool==='trendline'||drawTool==='measure'){
      /* Preview line from click1 to cursor */
      const pts=p1.ts<ts?[{time:p1.ts,value:p1.price},{time:ts,value:price}]:[{time:ts,value:price},{time:p1.ts,value:p1.price}];
      previewSeries.setData(pts);
    }else if(drawTool==='fib'){
      /* Preview vertical range */
      const hi=Math.max(p1.price,price),lo=Math.min(p1.price,price);
      const midT=Math.min(p1.ts,ts);
      previewSeries.setData([{time:midT,value:lo},{time:midT+1,value:hi}]);
    }else if(drawTool==='rect'){
      if(drawClicks.length===1){
        /* Preview edge 1 (line from click1 to cursor) */
        const pts=p1.ts<ts?[{time:p1.ts,value:p1.price},{time:ts,value:price}]:[{time:ts,value:price},{time:p1.ts,value:p1.price}];
        previewSeries.setData(pts);
      }else if(drawClicks.length===2){
        /* Preview full box from edge (click1→click2) offset by cursor price */
        const p2=drawClicks[1];
        const offset=price-p1.price;
        const a=p1,b=p2;
        const c_={ts:p2.ts,price:p2.price+offset};
        const d_={ts:p1.ts,price:p1.price+offset};
        /* Draw preview as 4-point outline: a→b→c→d→a */
        const all=[a,b,c_,d_,a].map(pt=>({t:pt.ts,v:pt.price}));
        /* Sort for rendering: just show the offset line */
        const pts=d_.ts<c_.ts?[{time:d_.ts,value:d_.price},{time:c_.ts,value:c_.price}]:[{time:c_.ts,value:c_.price},{time:d_.ts,value:d_.price}];
        previewSeries.setData(pts);
      }
    }
  }catch(x){clearPreview();}
}

function registerDrawing(type,seriesList,plList,label){
  const id=drawNextId++;
  const d={id,type,series:seriesList||[],priceLines:plList||[],label:label||type};
  allDrawings.push(d);
  return d;
}
function deleteDrawing(id){
  const idx=allDrawings.findIndex(d=>d.id===id);if(idx<0)return;
  const d=allDrawings[idx];
  d.series.forEach(s=>{try{chart.removeSeries(s);}catch(x){}});
  d.priceLines.forEach(pl=>{try{mainSeries.removePriceLine(pl);}catch(x){}});
  allDrawings.splice(idx,1);
  if(selectedDrawingId===id){selectedDrawingId=null;hideDrawDelBtn();}
}
function hideDrawDelBtn(){document.getElementById('drawDelBtn').style.display='none';}
function showDrawDelBtn(x,y,id){
  const btn=document.getElementById('drawDelBtn');
  btn.style.left=(x+8)+'px';btn.style.top=(y-10)+'px';btn.style.display='block';
  btn.onclick=()=>{deleteDrawing(id);hideDrawDelBtn();};
}

function setDraw(tool){
  if(tool==='clearAll'){
    allDrawings.slice().forEach(d=>deleteDrawing(d.id));
    priceLines.forEach(e=>{try{mainSeries.removePriceLine(e.priceLine);}catch(x){}});priceLines=[];
    trendSeries.forEach(s=>{try{chart.removeSeries(s);}catch(x){}});trendSeries=[];
    fibPriceLines.forEach(g=>g.forEach(pl=>{try{mainSeries.removePriceLine(pl);}catch(x){}}));fibPriceLines=[];
    drawClicks=[];drawState=null;showHint('');hideDrawDelBtn();
    return;
  }
  drawTool=tool;drawClicks=[];drawState=null;clearPreview();
  document.querySelectorAll('.tv-draw-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  document.querySelectorAll('#mobileDrawBar .tv-draw-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  const c=document.getElementById('chartContainer');
  const hints={crosshairTool:'',hline:'Click on chart to place horizontal line',hray:'Click start point for ray',trendline:'Click point 1',fib:'Click high point',rect:'Click edge point 1',measure:'Click point 1'};
  c.style.cursor=(tool==='crosshairTool')?'':'crosshair';
  showHint(hints[tool]||'');
}

function onChartClick(ts,price,point){
  if(drawTool==='crosshairTool'){
    /* Check if click is near a drawing — show delete button */
    let closest=null,minDist=Infinity;
    for(const d of allDrawings){
      for(const s of d.series){
        try{
          const coordY=s.priceToCoordinate(price);
          if(coordY!=null){
            const dy=Math.abs(point.y-coordY);
            if(dy<minDist){minDist=dy;closest=d;}
          }
        }catch(x){}
      }
      for(const pl of d.priceLines){
        try{
          const plPrice=pl.options().price;
          const coordY=mainSeries.priceToCoordinate(plPrice);
          if(coordY!=null){
            const dy=Math.abs(point.y-coordY);
            if(dy<minDist){minDist=dy;closest=d;}
          }
        }catch(x){}
      }
    }
    if(closest&&minDist<20){
      selectedDrawingId=closest.id;
      showDrawDelBtn(point.x,point.y,closest.id);
    }else{
      selectedDrawingId=null;hideDrawDelBtn();
    }
    return;
  }
  if(drawTool==='hline'){
    const opts={price,color:activeClr.accent||'#2962ff',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title:fmt(price)};
    const pl=mainSeries.createPriceLine(opts);priceLines.push({priceLine:pl,opts});
    registerDrawing('hline',[],[pl],'H-Line '+fmt(price));
    setDraw('crosshairTool');return;
  }
  if(drawTool==='hray'){
    drawClicks.push({ts,price});
    if(drawClicks.length===1){showHint('Click end point to define ray direction');return;}
    if(drawClicks.length===2){
      clearPreview();
      const p1=drawClicks[0],p2=drawClicks[1];
      /* Compute ray: from p1 through p2, extended far to the right.
         Use only 2 points (start + far end) so the line is perfectly straight. */
      const dT=p2.ts-p1.ts;
      const dP=p2.price-p1.price;
      /* Extend far: 500 candle intervals beyond p2, in the p1→p2 direction */
      const intSec=(curIntv||3)*60;
      const extLen=intSec*500;
      let farTs,farPrice;
      if(dT===0){
        /* Vertical click — extend rightward horizontally with same slope */
        farTs=p1.ts+extLen;
        farPrice=p2.price;
      }else{
        const slope=dP/dT;
        farTs=p2.ts+(dT>0?extLen:-extLen);
        farPrice=p2.price+slope*(farTs-p2.ts);
      }
      /* Build points in time-ascending order */
      const pts=[{time:p1.ts,value:p1.price},{time:farTs,value:farPrice}];
      pts.sort((a,b)=>a.time-b.time);
      const s=chart.addLineSeries({color:'#f59e0b',lineWidth:1.5,lineStyle:LightweightCharts.LineStyle.Dotted,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
      s.setData(pts);
      trendSeries.push(s);
      registerDrawing('hray',[s],[],'Ray');
      drawClicks=[];setDraw('crosshairTool');return;
    }
  }
  if(drawTool==='trendline'){
    drawClicks.push({ts,price});
    if(drawClicks.length===1){showHint('Click point 2');return;}
    if(drawClicks.length===2){
      const p1=drawClicks[0],p2=drawClicks[1];
      const s=chart.addLineSeries({color:'#2962ff',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:true,lineStyle:LightweightCharts.LineStyle.Solid});
      const pts=[{time:Math.min(p1.ts,p2.ts),value:p1.ts<p2.ts?p1.price:p2.price},{time:Math.max(p1.ts,p2.ts),value:p1.ts<p2.ts?p2.price:p1.price}];
      s.setData(pts);trendSeries.push(s);
      clearPreview();
      registerDrawing('trendline',[s],[],'Trend');
      drawClicks=[];setDraw('crosshairTool');return;
    }
  }
  if(drawTool==='fib'){
    drawClicks.push({ts,price});
    if(drawClicks.length===1){showHint('Click low point');return;}
    if(drawClicks.length===2){
      const hi=Math.max(drawClicks[0].price,drawClicks[1].price);
      const lo=Math.min(drawClicks[0].price,drawClicks[1].price);
      const diff=hi-lo;
      const levels=[0,0.236,0.382,0.5,0.618,0.786,1];
      const colors=['#ef5350','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0','#ef5350'];
      const lbls=['0%','23.6%','38.2%','50%','61.8%','78.6%','100%'];
      const group=levels.map((l,i)=>{
        const p=hi-diff*l;
        const opts={price:p,color:colors[i],lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title:`Fib ${lbls[i]} ${fmt(p)}`};
        return mainSeries.createPriceLine(opts);
      });
      fibPriceLines.push(group);
      clearPreview();
      registerDrawing('fib',[],group,'Fibonacci');
      drawClicks=[];setDraw('crosshairTool');return;
    }
  }
  if(drawTool==='rect'){
    drawClicks.push({ts,price});
    if(drawClicks.length===1){showHint('Click edge point 2');return;}
    if(drawClicks.length===2){showHint('Click to set box width (drag away from edge)');return;}
    if(drawClicks.length===3){
      clearPreview();
      /* 3-click box: click1 & click2 define one edge, click3 defines offset/width.
         Edge = A→B (click1→click2). The offset = perpendicular distance from edge to click3.
         C = B + offset, D = A + offset. Box = A→B→C→D. */
      const a={t:drawClicks[0].ts,p:drawClicks[0].price};
      const b={t:drawClicks[1].ts,p:drawClicks[1].price};
      const offset=price-a.p; /* vertical offset from edge to click3 */
      const c_={t:b.t,p:b.p+offset};
      const d_={t:a.t,p:a.p+offset};
      function mkEdge(from,to,color,lw){
        const s=chart.addLineSeries({color:color,lineWidth:lw,lineStyle:LightweightCharts.LineStyle.Solid,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
        let pts;
        if(from.t===to.t){
          pts=[{time:from.t,value:Math.min(from.p,to.p)},{time:from.t+1,value:Math.max(from.p,to.p)}];
        }else if(from.t<to.t){
          pts=[{time:from.t,value:from.p},{time:to.t,value:to.p}];
        }else{
          pts=[{time:to.t,value:to.p},{time:from.t,value:from.p}];
        }
        s.setData(pts);return s;
      }
      const sAB=mkEdge(a,b,'#2962ff',1.5);
      const sBC=mkEdge(b,c_,'#2962ff',1.5);
      const sCD=mkEdge(c_,d_,'#2962ff',1.5);
      const sDA=mkEdge(d_,a,'#2962ff',1.5);
      registerDrawing('rect',[sAB,sBC,sCD,sDA],[],'Box');
      drawClicks=[];setDraw('crosshairTool');return;
    }
  }
  if(drawTool==='measure'){
    drawClicks.push({ts,price});
    if(drawClicks.length===1){showHint('Click end point');return;}
    if(drawClicks.length===2){
      const p1=drawClicks[0],p2=drawClicks[1];
      const diff=p2.price-p1.price,pct=(diff/p1.price*100);
      const t1=Math.min(p1.ts,p2.ts),t2=Math.max(p1.ts,p2.ts);
      const bars=rawCandles.filter(c=>c.time>=t1&&c.time<=t2).length;
      const label=`${diff>=0?'+':''}${fmt(diff)} (${pct>=0?'+':''}${pct.toFixed(2)}%) · ${bars} bars`;
      const s=chart.addLineSeries({color:'#fbbf24',lineWidth:1.5,lineStyle:LightweightCharts.LineStyle.Dashed,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:true,title:label});
      const pts=[{time:Math.min(p1.ts,p2.ts),value:p1.ts<p2.ts?p1.price:p2.price},{time:Math.max(p1.ts,p2.ts),value:p1.ts<p2.ts?p2.price:p1.price}];
      s.setData(pts);
      clearPreview();
      registerDrawing('measure',[s],[],'Measure');
      drawClicks=[];setDraw('crosshairTool');return;
    }
  }
}

/* ─── SYMBOLS ─── */
async function loadSymbols(){
  /* 1. Subscribed market-data indices from settings */
  try{const d=await fetchJSON(API+'/settings/market-data/available');if(d&&d.indices&&d.indices.length)allSymbols=d.indices.filter(i=>i.subscribed||i.configured);}catch(e){}
  if(!allSymbols.length){try{const d=await fetchJSON(API+'/settings/market-data/subscribed');if(d){const subs=[...(d.subscribed||[]),...(d.configured||[])];if(subs.length)allSymbols=subs.map(s=>typeof s==='string'?{symbol:s,name:s,subscribed:true}:s);}}catch(e){}}
  /* 2. Symbols with historical data available */
  try{const d=await fetchJSON(API+'/historical/available-symbols');if(d){
    const idxSyms=d.index_symbols||d.symbols||d;
    if(Array.isArray(idxSyms))for(const s of idxSyms){const sym=typeof s==='string'?s:(s.symbol||'');if(sym&&!allSymbols.some(a=>a.symbol===sym))allSymbols.push({symbol:sym,name:sym,subscribed:false,hasData:true});}
    /* Option symbols with historical tick data */
    const optSyms=d.option_symbols;
    if(Array.isArray(optSyms))for(const o of optSyms){
      const sym=o.symbol,expiry=o.expiry;
      if(sym&&expiry&&!optionSymbols.some(x=>x.symbol===sym&&x.expiry===expiry)){
        optionSymbols.push({symbol:sym,name:sym+' ['+expiry+']',exchange:isMCX(sym)?'MCX':'NFO',expiry,subscribed:false,isOption:true,isUnderlying:true,hasData:true});
      }
    }
  }}catch(e){}
  /* 3. Active option chains from supervisor — get underlyings + expiries */
  let chainList=[];
  try{const d=await fetchJSON(API+'/option-chain/active-symbols');if(d&&Array.isArray(d))chainList=d;}catch(e){}
  /* 4. For each active chain, fetch individual trading symbols */
  for(const chain of chainList){
    const exchange=chain.exchange||'NFO',sym=chain.symbol||'';
    const expiries=chain.expiries||[];
    /* Add the underlying too */
    if(sym&&!optionSymbols.some(o=>o.symbol===sym&&o.isUnderlying))
      optionSymbols.push({symbol:sym,name:exchange+':'+sym,exchange,subscribed:true,isOption:true,isUnderlying:true,expiries});
    for(const expiry of expiries){
      try{
        const oc=await fetchJSON(API+'/option-chain?exchange='+encodeURIComponent(exchange)+'&symbol='+encodeURIComponent(sym)+'&expiry='+encodeURIComponent(expiry)+'&max_age=600');
        if(oc&&oc.rows){
          for(const row of oc.rows){
            const ts=row.trading_symbol;if(!ts)continue;
            if(optionSymbols.some(o=>o.symbol===ts))continue;
            const strike=row.strike,ot=row.option_type;
            const desc=exchange+':'+sym+' '+expiry+' '+strike+ot;
            optionSymbols.push({symbol:ts,name:desc,exchange,expiry,strike,option_type:ot,underlying:sym,subscribed:true,isOption:true,isContract:true,ltp:row.ltp,oi:row.oi});
            optionMeta[ts]={exchange,symbol:sym,expiry,strike,option_type:ot,trading_symbol:ts};
          }
        }
      }catch(e){}
    }
  }
  /* 5. Also handle loaded chains from settings (response is {chains:[...]}) */
  try{const d=await fetchJSON(API+'/settings/option-chains/loaded');
    const arr=d&&d.chains?d.chains:(Array.isArray(d)?d:[]);
    for(const chain of arr){
      const key=chain.key||'';const parts=key.split(':');const exchange=parts[0]||chain.exchange||'NFO';const sym=parts[1]||chain.symbol||'';const expiry=parts[2]||chain.expiry||'';
      if(!sym||!expiry)continue;
      /* Skip if already fetched via active-symbols path */
      if(chainList.some(c=>c.symbol===sym&&(c.expiries||[]).includes(expiry)))continue;
      try{
        const oc=await fetchJSON(API+'/option-chain?exchange='+encodeURIComponent(exchange)+'&symbol='+encodeURIComponent(sym)+'&expiry='+encodeURIComponent(expiry)+'&max_age=600');
        if(oc&&oc.rows){
          if(!optionSymbols.some(o=>o.symbol===sym&&o.isUnderlying))
            optionSymbols.push({symbol:sym,name:exchange+':'+sym,exchange,subscribed:true,isOption:true,isUnderlying:true});
          for(const row of oc.rows){
            const ts=row.trading_symbol;if(!ts)continue;
            if(optionSymbols.some(o=>o.symbol===ts))continue;
            const strike=row.strike,ot=row.option_type;
            optionSymbols.push({symbol:ts,name:exchange+':'+sym+' '+expiry+' '+strike+ot,exchange,expiry,strike,option_type:ot,underlying:sym,subscribed:true,isOption:true,isContract:true,ltp:row.ltp,oi:row.oi});
            optionMeta[ts]={exchange,symbol:sym,expiry,strike,option_type:ot,trading_symbol:ts};
          }
        }
      }catch(e){}
    }
  }catch(e){}
}

function getExchangeTag(sym){
  if(sym.endsWith('CE')||sym.endsWith('PE'))return{badge:'opt',text:'OPT'};
  if(isMCX(sym))return{badge:'mcx',text:'MCX'};
  return{badge:'idx',text:'NSE'};
}

function renderSymList(filter){
  const list=document.getElementById('symList');
  let idxItems=[...allSymbols],optItems=[...optionSymbols];
  if(filter){const q=filter.toLowerCase();idxItems=idxItems.filter(i=>i.symbol.toLowerCase().includes(q)||(i.name||'').toLowerCase().includes(q));optItems=optItems.filter(i=>i.symbol.toLowerCase().includes(q)||(i.name||'').toLowerCase().includes(q)||(i.underlying||'').toLowerCase().includes(q));}
  let html='';
  if(idxItems.length){
    html+='<div class="m-section">📊 Indices &amp; Market Data</div>';
    html+=idxItems.map(i=>{const a=i.symbol===curSym?' active':'';const tag=getExchangeTag(i.symbol);return`<div class="m-item${a}" data-symbol="${esc(i.symbol)}"><span class="m-sym-emoji">${symEmoji(i.symbol)}</span><span class="name">${esc(i.symbol)}</span><span class="desc">${esc(i.name||'')}</span><span class="badge ${tag.badge}">${tag.text}</span></div>`;}).join('');
  }
  /* Group option items: underlyings first, then contracts grouped by expiry */
  const underlyings=optItems.filter(i=>i.isUnderlying);
  const contracts=optItems.filter(i=>i.isContract);
  if(underlyings.length||contracts.length){
    /* Group contracts by underlying+expiry */
    const groups={};
    for(const c of contracts){
      const k=(c.underlying||c.symbol)+'|'+(c.expiry||'');
      if(!groups[k])groups[k]={underlying:c.underlying||c.symbol,expiry:c.expiry||'',exchange:c.exchange||'',items:[]};
      groups[k].items.push(c);
    }
    if(underlyings.length&&!contracts.length){
      html+='<div class="m-section">🎯 Option Chain (Underlying)</div>';
      html+=underlyings.map(i=>{const a=i.symbol===curSym?' active':'';return`<div class="m-item${a}" data-symbol="${esc(i.symbol)}"><span class="m-sym-emoji">${symEmoji(i.symbol)}</span><span class="name">${esc(i.symbol)}</span><span class="desc">${esc(i.name||'')}</span><span class="badge opt">OPT</span></div>`;}).join('');
    }
    for(const[,g]of Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0]))){
      html+=`<div class="m-section">🎯 ${esc(g.exchange)}:${esc(g.underlying)} [${esc(g.expiry)}] — ${g.items.length} strikes</div>`;
      /* Sort by strike, then CE before PE */
      g.items.sort((a,b)=>(a.strike||0)-(b.strike||0)||(a.option_type||'').localeCompare(b.option_type||''));
      html+=g.items.map(i=>{
        const a=i.symbol===curSym?' active':'';
        const ot=i.option_type||'';
        const otClass=ot==='CE'?'up':'dn';
        const ltpStr=i.ltp?fmt(i.ltp):'';
        return`<div class="m-item${a}" data-symbol="${esc(i.symbol)}"><span class="m-sym-emoji">${ot==='CE'?'📗':'📕'}</span><span class="name">${esc(i.symbol)}</span><span class="desc" style="color:var(--text-muted)">${i.strike||''} ${ot}${ltpStr?' · ₹'+ltpStr:''}</span><span class="badge opt" style="background:${ot==='CE'?'rgba(38,166,154,.12)':'rgba(239,83,80,.12)'};color:${ot==='CE'?'var(--up)':'var(--dn)'}">${ot}</span></div>`;
      }).join('');
    }
  }
  if(!html)html='<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">No symbols found</div>';
  list.innerHTML=html;
}

function indInstanceLabel(inst){
  const cat=IND_CATALOG.find(c=>c.type===inst.type);

function renderIndList(filter){
  const q=(filter||'').toLowerCase();
  let html='';
  /* ── Active Indicators section ── */
  if(activeIndicators.length){
    html+='<div class="m-section" style="display:flex;justify-content:space-between;align-items:center">Active <span style="font-size:11px;color:var(--text-muted)">'+activeIndicators.length+' added</span></div>';
    for(const inst of activeIndicators){
      const lbl=indInstanceLabel(inst);
      if(q&&!lbl.toLowerCase().includes(q)&&!(inst.type).includes(q))continue;
      html+=`<div class="m-item active" data-uid="${esc(inst.uid)}"><span class="swatch" style="background:${inst.cfg.color||'#888'}"></span><span class="name">${esc(lbl)}</span><button class="ind-gear" data-gear-uid="${esc(inst.uid)}" title="Settings">⚙️</button><button class="ind-gear" data-remove-uid="${esc(inst.uid)}" title="Remove" style="color:#ef5350">✕</button></div>`;
    }
    html+='<div style="border-bottom:1px solid var(--border);margin:6px 0"></div>';
  }
  /* ── Available Indicators catalog ── */
  const cats={};
  for(const cat of IND_CATALOG){
    if(q&&!cat.label.toLowerCase().includes(q)&&!cat.cat.toLowerCase().includes(q)&&!cat.type.includes(q))continue;
    if(!cats[cat.cat])cats[cat.cat]=[];
    cats[cat.cat].push(cat);
  }
  for(const catName of Object.keys(cats)){
    html+=`<div class="m-section">${esc(catName)}</div>`;
    html+=cats[catName].map(cat=>{
      return`<div class="m-item" data-add-type="${cat.type}"><span class="swatch" style="background:${cat.defaults.color||'#888'}"></span><span class="name">${esc(cat.label)}</span><span style="margin-left:auto;font-size:11px;color:var(--text-muted);padding:2px 8px;border:1px solid var(--border);border-radius:4px;cursor:pointer" data-add-type="${cat.type}">+ Add</span></div>`;
    }).join('');
  }
  if(!html)html='<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">No indicators</div>';
  document.getElementById('indList').innerHTML=html;
}

let curIndUid=null;
function openIndSettings(uid){
  curIndUid=uid;
  const inst=activeIndicators.find(i=>i.uid===uid);if(!inst)return;
  const cat=IND_CATALOG.find(c=>c.type===inst.type);if(!cat)return;
  document.getElementById('indSetTitle').textContent='⚙️ '+indInstanceLabel(inst);
  const paramLabels={period:'Period',stdDev:'Std Dev',mult:'Multiplier',step:'Step',max:'Max AF',color:'Color',lineWidth:'Line Width',upColor:'Up Color',dnColor:'Down Color'};
  let html='';
  for(const p of (cat.params||[])){
    const v=inst.cfg[p]!==undefined?inst.cfg[p]:cat.defaults[p]||'';
    const lbl=paramLabels[p]||p;
    const isColor=p.toLowerCase().includes('color');
    const isInt=['period','stdDev'].includes(p);
    const isFloat=['mult','step','max','lineWidth'].includes(p);
    const type=isColor?'color':((isInt||isFloat)?'number':'text');
    const step=isInt?'1':'0.01';
    html+=`<div class="ind-settings-row"><label>${esc(lbl)}</label><input type="${type}" id="isp_${p}" value="${esc(String(v))}" ${type==='number'?'min="0" step="'+step+'"':''}></div>`;
  }
  document.getElementById('indSetBody').innerHTML=html;
  openModal('indSetModal');
}
function applyIndSettings(){
  if(!curIndUid)return;
  const inst=activeIndicators.find(i=>i.uid===curIndUid);if(!inst)return;
  const cat=IND_CATALOG.find(c=>c.type===inst.type);if(!cat)return;
  for(const p of (cat.params||[])){
    const el=document.getElementById('isp_'+p);if(!el)continue;
    const isNum=el.type==='number'||['period','stdDev','mult','step','max','lineWidth'].includes(p);
    inst.cfg[p]=isNum?parseFloat(el.value):el.value;
  }
  saveSettings();
  applyIndicators();
  closeModal('indSetModal');
  renderIndList(document.getElementById('indInput').value);
}

  }).join('');
  grid.querySelectorAll('.theme-card').forEach(card=>{

      if(k!=='custom'){

/* ─── AUTO REFRESH ─── */
function startRefresh(){
  if(autoTimer)clearInterval(autoTimer);
  autoTimer=setInterval(()=>{if(!document.getElementById('chkRefresh').checked)return;const h=new Date().getUTCHours();if(h>=3&&h<=18)loadData({silent:true,keepZoom:true});},10000);
}

/* ─── INIT ─── */
async function init(){
  loadSettings();
  // URL hash overrides saved symbol
  if(location.hash&&location.hash.length>1)curSym=decodeURIComponent(location.hash.slice(1)).toUpperCase();
  // Apply saved theme class
  const thm=THEMES[curTheme];
  if(thm&&thm.cls)document.body.classList.add(thm.cls);
  // Restore UI state
  document.getElementById('lblInterval').textContent=fmtIntv(curIntv);
  document.getElementById('lblChartType').textContent=CT_LABELS[curType]||'Candles';
  document.querySelectorAll('.tv-range button').forEach(b=>b.classList.toggle('active',b.dataset.range===curRange));
  document.querySelectorAll('#chartModeToggle button').forEach(b=>b.classList.toggle('active',b.dataset.mode===chartMode));
  initChart();
  await loadSymbols();
  if(allSymbols.length&&!allSymbols.some(s=>s.symbol===curSym)){const first=allSymbols[0];if(first)curSym=first.symbol;}
  document.getElementById('tbSym').textContent=curSym;
  document.getElementById('tbSymEmoji').textContent=symEmoji(curSym);
  await loadData();
  // Restore zoom/scroll position from saved state
  if(savedVisRange&&chart){try{chart.timeScale().setVisibleRange(savedVisRange);}catch(e){}}
  // Restore overlay symbols
  for(const sym of savedOverlaySyms){await addOverlay(sym);}
  startRefresh();
  // Expose for inline onclick
  window.openIndSettings=openIndSettings;
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();

})();
</script>
</body>
</html>
