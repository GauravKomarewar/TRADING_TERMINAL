<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option Chain Analytics | Shoonya Platform</title>
<link rel="stylesheet" href="/dashboard/web/styles/common.css">
<link rel="stylesheet" href="/dashboard/web/shared/layout.css">
<script src="/dashboard/web/shared/pages-config.js" defer></script>
<script src="/dashboard/web/shared/layout.js" defer></script>
<style>
:root {
  --bg:#07121e;
  --panel:rgba(11,23,39,0.9);
  --panel2:rgba(7,17,30,0.95);
  --border:rgba(255,255,255,0.12);
  --text:#eaf4ff;
  --muted:rgba(234,244,255,0.65);
  --accent:#6ce5ff;
  --warn:#f8c565;
  --good:#4ade80;
  --bad:#fb7185;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Mono',monospace;background:radial-gradient(circle at 20% 0%,#153050 0%,#07111d 45%,#04080f 100%);color:var(--text);min-height:100vh}
main{max-width:1700px;margin:0 auto;padding:18px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.sel,.btn{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:12px}
.btn{cursor:pointer;background:linear-gradient(120deg,#6ce5ff,#35b7ff);color:#02101d;font-weight:700;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:12px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px}
.k{font-size:11px;color:var(--muted)}
.v{font-size:18px;font-weight:700;margin-top:3px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chart{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px}
.chart h3{font-size:12px;margin-bottom:8px;color:var(--accent)}
canvas{width:100%;height:280px;display:block;border:1px solid rgba(255,255,255,0.08);border-radius:8px;background:rgba(0,0,0,0.2)}
.status{margin-bottom:8px;color:var(--muted);font-size:11px}
@media (max-width:1080px){.charts{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
  <div class="toolbar">
    <select id="ex" class="sel"></select>
    <select id="sym" class="sel"></select>
    <select id="exp" class="sel"></select>
    <button class="btn" onclick="refreshAll()">Refresh</button>
    <span id="status" class="status"></span>
  </div>

  <div class="grid" id="cards"></div>

  <div class="charts">
    <div class="chart"><h3>ATM Straddle by Strike</h3><canvas id="c_straddle"></canvas></div>
    <div class="chart"><h3>Total OI (CE/PE) by Strike</h3><canvas id="c_oi"></canvas></div>
    <div class="chart"><h3>OI Build-Up (OI Change) by Strike</h3><canvas id="c_buildup"></canvas></div>
    <div class="chart"><h3>PCR by Strike</h3><canvas id="c_pcr"></canvas></div>
    <div class="chart"><h3>PCS (CE LTP - PE LTP) by Strike</h3><canvas id="c_pcs"></canvas></div>
  </div>
</main>

<script>
const API_BASE='/dashboard';
let symbolIndex=[];
let currentRows=[];
let currentMeta={};

const $=id=>document.getElementById(id);

async function api(path){
  const r=await fetch(API_BASE+path,{credentials:'include'});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function toNum(v){const n=Number(v||0);return Number.isFinite(n)?n:0;}
function f2(v){return toNum(v).toFixed(2);}

function drawLine(canvas, labels, series, opts={}){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth||700,h=canvas.clientHeight||280;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  const ctx=canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,w,h);
  if(!labels.length||!series.length) { ctx.fillStyle='#9fb7cc'; ctx.fillText('No data',10,20); return; }
  const pad={l:46,r:16,t:16,b:28}, pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const vals=series.flatMap(s=>s.values).filter(v=>Number.isFinite(v));
  let vMin=Math.min(...vals), vMax=Math.max(...vals); if(vMin===vMax){vMin-=1;vMax+=1;}
  const x=i=>pad.l + (i/Math.max(1,labels.length-1))*pw;
  const y=v=>pad.t + (1-((v-vMin)/Math.max(1e-9,vMax-vMin)))*ph;
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+ph); ctx.lineTo(pad.l+pw,pad.t+ph); ctx.stroke();
  series.forEach(s=>{
    ctx.strokeStyle=s.color; ctx.lineWidth=2; ctx.beginPath();
    s.values.forEach((v,i)=>{const px=x(i),py=y(v); if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);});
    ctx.stroke();
  });
  if(opts.vlines){
    opts.vlines.forEach(v=>{
      const idx=labels.findIndex(x=>String(x)===String(v.value)); if(idx<0) return;
      ctx.strokeStyle=v.color; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x(idx),pad.t); ctx.lineTo(x(idx),pad.t+ph); ctx.stroke();
    });
  }
  ctx.fillStyle='#9fb7cc'; ctx.font='11px IBM Plex Mono, monospace';
  ctx.fillText(String(labels[0]),pad.l,pad.t+ph+16); ctx.fillText(String(labels[labels.length-1]),pad.l+pw-40,pad.t+ph+16);
  ctx.fillText(vMin.toFixed(2),4,pad.t+ph); ctx.fillText(vMax.toFixed(2),4,pad.t+10);
}

function drawBars(canvas, labels, a, b, colors){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth||700,h=canvas.clientHeight||280;
  canvas.width=Math.floor(w*dpr); canvas.height=Math.floor(h*dpr);
  const ctx=canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,w,h);
  if(!labels.length){ctx.fillStyle='#9fb7cc';ctx.fillText('No data',10,20);return;}
  const pad={l:46,r:10,t:16,b:28}, pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  const vals=[...a,...b].map(toNum); let vMin=Math.min(...vals),vMax=Math.max(...vals); if(vMin===vMax){vMin-=1;vMax+=1;}
  const center=i=>pad.l + ((i+0.5)/labels.length)*pw;
  const y=v=>pad.t + (1-((v-vMin)/Math.max(1e-9,vMax-vMin)))*ph;
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,pad.t+ph); ctx.lineTo(pad.l+pw,pad.t+ph); ctx.stroke();
  const bw=Math.max(2,(pw/labels.length)*0.36);
  labels.forEach((_,i)=>{
    const cx=center(i),y0=y(0),ya=y(toNum(a[i])),yb=y(toNum(b[i]));
    ctx.fillStyle=colors[0]; ctx.fillRect(cx-bw-1,Math.min(y0,ya),bw,Math.max(1,Math.abs(y0-ya)));
    ctx.fillStyle=colors[1]; ctx.fillRect(cx+1,Math.min(y0,yb),bw,Math.max(1,Math.abs(y0-yb)));
  });
}

function calcMaxPain(rows){
  const strikes=[...new Set(rows.map(r=>toNum(r.strike)))].sort((a,b)=>a-b);
  const ceBy={},peBy={};
  rows.forEach(r=>{const k=toNum(r.strike); if(String(r.option_type).toUpperCase()==='CE') ceBy[k]=toNum(r.oi); else peBy[k]=toNum(r.oi);});
  let bestK=0,bestPain=Number.POSITIVE_INFINITY;
  strikes.forEach(k=>{
    let pain=0;
    strikes.forEach(s=>{ pain += Math.max(0,s-k)*toNum(ceBy[s]); pain += Math.max(0,k-s)*toNum(peBy[s]); });
    if(pain<bestPain){bestPain=pain;bestK=k;}
  });
  return bestK;
}

function updateCards(meta, points){
  const ceOi=points.reduce((t,p)=>t+p.ceOi,0), peOi=points.reduce((t,p)=>t+p.peOi,0);
  const ceVol=points.reduce((t,p)=>t+p.ceVol,0), peVol=points.reduce((t,p)=>t+p.peVol,0);
  const pcrOi=ceOi>0?peOi/ceOi:0, pcrVol=ceVol>0?peVol/ceVol:0;
  const straddleAtm=points.reduce((best,p)=>Math.abs(p.strike-toNum(meta.atm_strike)) < Math.abs(best.strike-toNum(meta.atm_strike)) ? p : best, points[0]||{straddle:0}).straddle;
  $('cards').innerHTML=`
    <div class="card"><div class="k">Spot</div><div class="v">${f2(meta.spot_price)}</div></div>
    <div class="card"><div class="k">ATM Strike</div><div class="v">${f2(meta.atm_strike)}</div></div>
    <div class="card"><div class="k">Max Pain</div><div class="v">${f2(meta.max_pain)}</div></div>
    <div class="card"><div class="k">PCR (OI)</div><div class="v">${f2(pcrOi)}</div></div>
    <div class="card"><div class="k">PCR (Volume)</div><div class="v">${f2(pcrVol)}</div></div>
    <div class="card"><div class="k">ATM Straddle</div><div class="v">${f2(straddleAtm)}</div></div>
  `;
}

function render(){
  const rows=currentRows||[];
  const byStrike=new Map();
  rows.forEach(r=>{
    const k=toNum(r.strike); if(!byStrike.has(k)) byStrike.set(k,{strike:k,ceLtp:0,peLtp:0,ceOi:0,peOi:0,ceOiChg:0,peOiChg:0,ceVol:0,peVol:0});
    const x=byStrike.get(k); const ot=String(r.option_type).toUpperCase();
    if(ot==='CE'){x.ceLtp=toNum(r.ltp);x.ceOi=toNum(r.oi);x.ceOiChg=toNum(r.oi_change);x.ceVol=toNum(r.volume);} else {x.peLtp=toNum(r.ltp);x.peOi=toNum(r.oi);x.peOiChg=toNum(r.oi_change);x.peVol=toNum(r.volume);}    
  });
  let pts=[...byStrike.values()].sort((a,b)=>a.strike-b.strike).map(p=>({...p,straddle:p.ceLtp+p.peLtp,pcr:p.ceOi>0?p.peOi/p.ceOi:0,pcs:p.ceLtp-p.peLtp}));
  const atm=toNum(currentMeta.atm_strike);
  if(pts.length>60){
    pts=pts.sort((a,b)=>Math.abs(a.strike-atm)-Math.abs(b.strike-atm)).slice(0,60).sort((a,b)=>a.strike-b.strike);
  }
  const labels=pts.map(p=>p.strike);
  const maxPain=calcMaxPain(rows);
  const meta={...currentMeta,max_pain:maxPain};

  drawLine($('c_straddle'), labels, [{values:pts.map(p=>p.straddle),color:'#6ce5ff'}], {
    vlines:[{value:atm,color:'#f8c565'},{value:maxPain,color:'#fb7185'}]
  });
  drawBars($('c_oi'), labels, pts.map(p=>p.ceOi), pts.map(p=>p.peOi), ['rgba(74,222,128,0.8)','rgba(251,113,133,0.8)']);
  drawBars($('c_buildup'), labels, pts.map(p=>p.ceOiChg), pts.map(p=>p.peOiChg), ['rgba(74,222,128,0.75)','rgba(251,113,133,0.75)']);
  drawLine($('c_pcr'), labels, [{values:pts.map(p=>p.pcr),color:'#f8c565'}], { vlines:[{value:atm,color:'#6ce5ff'}] });
  drawLine($('c_pcs'), labels, [{values:pts.map(p=>p.pcs),color:'#c4b5fd'}], { vlines:[{value:atm,color:'#6ce5ff'}] });

  updateCards(meta, pts);
}

async function loadSymbols(){
  const list=await api('/option-chain/active-symbols');
  symbolIndex=Array.isArray(list)?list:[];
  const exs=[...new Set(symbolIndex.map(x=>x.exchange).filter(Boolean))].sort();
  $('ex').innerHTML=exs.map(x=>`<option>${x}</option>`).join('');
  $('ex').onchange=syncSymbol;
  $('sym').onchange=syncExpiry;
  syncSymbol();
}

function syncSymbol(){
  const ex=$('ex').value;
  const syms=symbolIndex.filter(x=>x.exchange===ex).map(x=>x.symbol).sort();
  $('sym').innerHTML=syms.map(x=>`<option>${x}</option>`).join('');
  syncExpiry();
}

function syncExpiry(){
  const ex=$('ex').value,sym=$('sym').value;
  const row=symbolIndex.find(x=>x.exchange===ex && x.symbol===sym);
  const exps=(row?.expiries||[]).slice().sort();
  $('exp').innerHTML=exps.map(x=>`<option>${x}</option>`).join('');
  refreshAll();
}

async function refreshAll(){
  const ex=$('ex').value,sym=$('sym').value,exp=$('exp').value;
  if(!ex||!sym||!exp) return;
  $('status').textContent='Loading...';
  try{
    const r=await api(`/option-chain?exchange=${encodeURIComponent(ex)}&symbol=${encodeURIComponent(sym)}&expiry=${encodeURIComponent(exp)}&max_age=300`);
    currentRows=r.rows||[];
    currentMeta=r.meta||{};
    render();
    $('status').textContent=`Snapshot age ${toNum(currentMeta.snapshot_age).toFixed(1)}s` + (currentMeta.is_stale?' (stale)':'');
  }catch(e){
    $('status').textContent='Load failed';
  }
}

window.addEventListener('load', async ()=>{
  await loadSymbols();
  setInterval(refreshAll, 5000);
  window.addEventListener('resize', render);
});
</script>
</body>
</html>
