# =============================================================================
# SHOONYA TRADING PLATFORM — Nginx Configuration
# =============================================================================
#
# Architecture:
#
#   Internet (80/443)
#       │
#       ▼
#   Nginx  (:443 HTTPS)
#       ├── /master/*          → Master Account Manager  (:9000)
#       └── /*  (all else)     → Multi-Client Gateway    (:7000)
#                                      │
#                              ┌───────┴──────┐
#                              ▼              ▼
#                  /FA14667/webhook     /FA14667/dashboard/*
#                  → Client :5001       → Client :8001
#                  /FA14668/webhook     /FA14668/dashboard/*
#                  → Client :5002       → Client :8002
#
# Services:
#   gateway.service        - manages all client routing (port 7000)
#   trading@FA14667.service - client execution + dashboard (5001/8001)
#   trading@FA14668.service - client execution + dashboard (5002/8002)
#   master.service         - admin control plane (port 9000)
#
# Install:
#   sudo cp utilities/deployment/nginx/trading.conf /etc/nginx/sites-available/trading
#   sudo ln -sf /etc/nginx/sites-available/trading /etc/nginx/sites-enabled/trading
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# HTTP → HTTPS redirect (all hosts)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;                # Replace with real domain when available

    # ---------------------------------------------------------------
    # TLS — replace self-signed cert with Let's Encrypt for production
    # sudo certbot --nginx -d yourdomain.com
    # ---------------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ---------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Request body limit (webhooks are small; 1m is generous)
    client_max_body_size 1m;

    # Logging (nginx access log per virtual host)
    access_log /var/log/nginx/trading_access.log combined;
    error_log  /var/log/nginx/trading_error.log warn;

    # ---------------------------------------------------------------
    # MASTER ACCOUNT MANAGER  →  /master/*
    # Admin dashboard: view, start/stop/restart all client services,
    # manage copy-trading, block/unblock trading accounts.
    # Access: https://<server>/master/
    # ---------------------------------------------------------------
    location /master/ {
        proxy_pass         http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (master dashboard SSE / live updates)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ---------------------------------------------------------------
    # MULTI-CLIENT GATEWAY  →  /*  (all other paths)
    #
    # TradingView Webhooks:
    #   POST https://<server>/FA14667/webhook  →  gateway  →  :5001/webhook
    #   POST https://<server>/FA14668/webhook  →  gateway  →  :5002/webhook
    #
    # Client Dashboards:
    #   GET  https://<server>/FA14667/dashboard/  →  gateway  →  :8001/
    #   GET  https://<server>/FA14668/dashboard/  →  gateway  →  :8002/
    #
    # Configure aliases in config_env/client_routes.json
    # ---------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (dashboard live feed)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        # Buffering off for streaming/SSE endpoints
        proxy_buffering    off;
    }

    # ---------------------------------------------------------------
    # GATEWAY HEALTH  →  /health   (nginx passthrough to gateway:7000)
    # Used by load balancers / monitoring tools
    # ---------------------------------------------------------------
    location = /health {
        proxy_pass        http://127.0.0.1:7000/health;
        proxy_http_version 1.1;
        access_log        off;
    }
}
